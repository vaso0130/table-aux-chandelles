<title>雷諾曼占卜</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --felt-950: #0A110D;
    --felt-900: #0E1713;
    --felt-800: #14201B;
    --felt-700: #1C2B24;
    --felt-line: #2E4237;
    --gold: #C9A45C;
    --gold-bright: #E5CC8F;
    --gold-dim: #8A7245;
    --ivory: #F2E8D5;
    --ivory-shade: #E2D2B4;
    --ink: #33291D;
    --ink-soft: #5C4F3C;
    --red: #A8402F;
    --muted: #8FA396;
    --back-1: #1E2A4A;
    --back-2: #16203A;
    --serif: "Noto Serif TC", "Palatino Linotype", "Book Antiqua", "PMingLiU", "新細明體", Georgia, serif;
  }

  * { box-sizing: border-box; }

  html, body { margin: 0; padding: 0; }

  body {
    font-family: var(--serif);
    background:
      radial-gradient(1200px 700px at 50% -10%, rgba(201,164,92,.10), transparent 60%),
      radial-gradient(900px 600px at 85% 110%, rgba(201,164,92,.05), transparent 55%),
      var(--felt-900);
    color: var(--ivory);
    min-height: 100vh;
    line-height: 1.7;
  }

  .wrap { max-width: 1080px; margin: 0 auto; padding: 0 20px 96px; }

  /* ── 標題（印刷銘版：雙細線，不發光） ────── */
  header { text-align: center; padding: 48px 0 0; }
  .plate {
    max-width: 560px; margin: 0 auto;
    border-top: 3px double var(--gold-dim);
    border-bottom: 3px double var(--gold-dim);
    padding: 26px 12px 24px;
    position: relative;
  }
  .plate::after {
    content: "❦";
    position: absolute; left: 50%; bottom: -11px;
    transform: translateX(-50%);
    background: var(--felt-900);
    padding: 0 12px;
    color: var(--gold-dim); font-size: 14px; line-height: 1.4;
  }
  .eyebrow {
    color: var(--gold-dim);
    font-size: 11px;
    letter-spacing: .38em;
    text-indent: .38em;
    text-transform: uppercase;
    margin: 0 0 12px;
  }
  h1 {
    font-size: clamp(32px, 6vw, 46px);
    font-weight: 600;
    letter-spacing: .14em;
    text-indent: .14em;
    margin: 0 0 8px;
    color: var(--gold-bright);
    text-wrap: balance;
  }
  .subtitle { color: var(--muted); font-size: 15px; margin: 0; }

  /* ── 盤面目錄（仿古書目次：數字＋引線） ──── */
  .section-label {
    color: var(--gold);
    font-size: 12px;
    letter-spacing: .45em;
    text-indent: .45em;
    text-align: center;
    margin: 44px 0 18px;
  }
  .spreads { max-width: 640px; margin: 0 auto; }
  .spread-btn {
    font-family: inherit;
    display: block; width: 100%;
    text-align: left;
    background: none;
    border: none;
    border-bottom: 1px solid var(--felt-line);
    color: var(--ivory);
    padding: 15px 6px 13px;
    cursor: pointer;
    transition: background-color .2s;
  }
  .spread-btn:first-child { border-top: 1px solid var(--felt-line); }
  .spread-btn:hover, .spread-btn:focus-visible { background: rgba(201,164,92,.06); }
  .spread-btn:focus-visible { outline: 1px solid var(--gold-dim); outline-offset: -1px; }
  .spread-btn .s-row { display: flex; align-items: baseline; gap: 12px; }
  .spread-btn .s-idx {
    flex: 0 0 auto; width: 1.6em;
    color: var(--gold-dim); font-size: 14px;
  }
  .spread-btn.active .s-idx { color: var(--gold-bright); }
  .spread-btn.active .s-idx::before { content: "❧ "; font-size: 11px; }
  .spread-btn .s-name { flex: 0 0 auto; font-size: 16.5px; color: var(--gold-bright); letter-spacing: .06em; }
  .spread-btn .s-leader {
    flex: 1; min-width: 24px;
    border-bottom: 1px dotted var(--felt-line);
    transform: translateY(-4px);
  }
  .spread-btn:hover .s-leader { border-color: var(--gold-dim); }
  .spread-btn .s-count { flex: 0 0 auto; font-size: 12.5px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .spread-btn .s-desc { font-size: 13px; color: var(--muted); line-height: 1.6; margin-top: 4px; padding-left: calc(1.6em + 12px); }

  /* ── 頁面切換（占卜牌桌／牌義字典） ────────── */
  .views {
    display: flex; justify-content: center;
    width: max-content; margin: 34px auto 0;
    border: 1px solid var(--felt-line); border-radius: 2px;
  }
  .view-btn {
    font-family: inherit;
    background: none; border: none;
    color: var(--muted);
    font-size: 14px; letter-spacing: .22em; text-indent: .22em;
    padding: 11px 30px; cursor: pointer;
    transition: color .2s, background-color .2s;
  }
  .view-btn + .view-btn { border-left: 1px solid var(--felt-line); }
  .view-btn:hover, .view-btn:focus-visible { color: var(--ivory); }
  .view-btn:focus-visible { outline: 1px solid var(--gold-dim); outline-offset: -1px; }
  .view-btn.active { color: var(--gold-bright); background: rgba(201,164,92,.08); }

  /* ── 牌組選單 ─────────────────────────────── */
  .decks { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; }
  .deck-btn {
    font-family: inherit;
    background: none;
    border: 1px solid var(--felt-line); border-radius: 2px;
    padding: 12px 26px; cursor: pointer;
    text-align: center;
    transition: border-color .2s, background-color .2s;
  }
  .deck-btn:hover, .deck-btn:focus-visible { background: rgba(201,164,92,.06); }
  .deck-btn:focus-visible { outline: 1px solid var(--gold-dim); outline-offset: -1px; }
  .deck-btn.active { border-color: var(--gold-dim); }
  .deck-btn .d-name { display: block; font-size: 16.5px; letter-spacing: .14em; text-indent: .14em; color: var(--ivory); }
  .deck-btn.active .d-name { color: var(--gold-bright); }
  .deck-btn .d-sub { display: block; font-size: 11px; letter-spacing: .14em; color: var(--muted); margin-top: 5px; }

  /* ── 牌桌 ─────────────────────────────────── */
  #table { display: none; margin-top: 40px; }
  #table.on { display: block; }

  .table-head {
    display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px 18px;
    border-bottom: 1px solid var(--felt-line);
    padding-bottom: 14px; margin-bottom: 28px;
  }
  .table-head h2 { font-size: 22px; letter-spacing: .12em; color: var(--gold-bright); margin: 0; font-weight: 600; }
  .table-head .hint { color: var(--muted); font-size: 14px; }
  .table-head .spacer { flex: 1; }
  .ghost-btn {
    font-family: inherit; font-size: 13px; letter-spacing: .15em;
    background: none; border: 1px solid var(--felt-line); border-radius: 2px;
    color: var(--muted); padding: 7px 14px; cursor: pointer;
    transition: color .2s, border-color .2s;
  }
  .ghost-btn:hover, .ghost-btn:focus-visible { color: var(--gold-bright); border-color: var(--gold-dim); }
  .ghost-btn:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  /* 問題輸入 */
  .question-row {
    display: flex; align-items: center; gap: 14px;
    margin: 0 0 26px;
  }
  .question-row label {
    flex: 0 0 auto; font-size: 12px; letter-spacing: .35em; text-indent: .35em;
    color: var(--gold);
    white-space: nowrap;
  }
  #q-input {
    flex: 1; min-width: 0;
    font-family: var(--serif); font-size: 15px;
    color: var(--ivory);
    background: var(--felt-800);
    border: 1px solid var(--felt-line); border-radius: 2px;
    padding: 10px 14px;
    transition: border-color .2s;
  }
  #q-input::placeholder { color: var(--muted); opacity: .7; }
  #q-input:focus { outline: none; border-color: var(--gold-dim); }

  /* 牌陣槽位 */
  #slots-scroll { overflow-x: auto; padding: 6px 2px 14px; }
  /* width:max-content + margin:auto——窄於螢幕時置中，寬於螢幕時可完整捲動
     （justify-content:center 會讓超出的左半邊無法捲到） */
  #slots { display: grid; gap: 14px; width: max-content; margin: 0 auto; --cw: 118px; }
  #slots.tableau { --cw: 82px; gap: 10px; }

  .slot { width: var(--cw); }
  .slot .pos-label {
    text-align: center; font-size: 12px; color: var(--muted);
    letter-spacing: .1em; margin-bottom: 6px; min-height: 1.5em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .slot .pos-label.house { color: var(--gold-dim); font-size: 11px; }

  .card-well {
    /* 明確算出高度——部分行動版 WebKit 對 aspect-ratio 容器內的
       百分比高度會解析成 0，導致卡面被壓成一條 */
    width: var(--cw); height: calc(var(--cw) * 1.5);
    border: 1px dashed var(--felt-line);
    border-radius: 8px;
    perspective: 900px;
  }
  .card-well.filled { border-color: transparent; }

  /* 卡片本體（3D 翻面） */
  .card3d {
    position: relative; width: 100%; height: 100%;
    transform-style: preserve-3d;
    transition: transform .6s cubic-bezier(.4, .1, .2, 1);
    transform: rotateY(180deg);
    cursor: default;
  }
  .card3d.revealed { transform: rotateY(0deg); }
  .card3d.clickable { cursor: pointer; }

  .cface {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    border-radius: 8px;
    overflow: hidden;
  }
  .cface.back {
    transform: rotateY(180deg);
    background:
      repeating-linear-gradient(45deg, rgba(201,164,92,.12) 0 1px, transparent 1px 9px),
      repeating-linear-gradient(-45deg, rgba(201,164,92,.12) 0 1px, transparent 1px 9px),
      linear-gradient(160deg, var(--back-1), var(--back-2));
    border: 1px solid rgba(201,164,92,.4);
    display: flex; align-items: center; justify-content: center;
  }
  .cface.back::after {
    content: "❋";
    color: var(--gold); opacity: .8;
    font-size: calc(var(--cw) * .3);
    text-shadow: 0 0 18px rgba(201,164,92,.5);
  }
  .cface.front {
    background: linear-gradient(170deg, var(--ivory), var(--ivory-shade));
    color: var(--ink);
    border: 1px solid var(--gold-dim);
    box-shadow: inset 0 0 0 3px var(--ivory), inset 0 0 0 4px rgba(138,114,69,.55);
    display: flex; flex-direction: column;
    padding: calc(var(--cw) * .07);
  }
  .cface.front .c-num {
    font-size: calc(var(--cw) * .11);
    letter-spacing: .08em;
    color: var(--ink-soft);
    display: flex; justify-content: space-between;
  }
  .cface.front .c-num .pol { font-size: calc(var(--cw) * .1); }
  .pol.good { color: var(--gold-dim); }
  .pol.bad { color: var(--red); }
  .pol.mid { color: #8b8b7a; }
  .cface.front .c-art {
    flex: 1; display: flex; align-items: center; justify-content: center;
    font-size: calc(var(--cw) * .42);
    filter: sepia(.5) saturate(.75) contrast(.95);
  }
  .cface.front .c-zh {
    text-align: center;
    font-size: calc(var(--cw) * .14);
    letter-spacing: .18em; text-indent: .18em;
    font-weight: 600;
  }
  .cface.front .c-latin {
    text-align: center;
    font-size: calc(var(--cw) * .085);
    letter-spacing: .12em;
    color: var(--ink-soft);
    text-transform: uppercase;
    /* 西碧拉的義大利文牌名較長，超出時截斷 */
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    padding: 0 2px;
  }
  .card3d.spotlit .cface.front { box-shadow: inset 0 0 0 3px var(--ivory), inset 0 0 0 4px rgba(138,114,69,.55), 0 0 0 2px var(--gold), 0 0 24px rgba(201,164,92,.45); }

  /* 逆位牌：牌面圖與圖騰倒轉，文字銘牌保持可讀 */
  .card3d.rev .cface.front .c-art,
  .card3d.rev .cface.front .c-img { transform: rotate(180deg); }

  /* 正逆位標記（解讀帳冊） */
  .o-tag {
    font-size: 11.5px; letter-spacing: .18em; text-indent: .18em;
    border: 1px solid rgba(138,114,69,.5); border-radius: 3px;
    padding: 1px 4px 1px 8px;
    color: var(--gold-dim); white-space: nowrap;
  }
  .o-tag.rev { color: var(--red); border-color: rgba(168,64,47,.45); }

  @keyframes deal-in {
    from { opacity: 0; transform: translateY(26px) rotateY(180deg) scale(.92); }
    to   { opacity: 1; transform: translateY(0) rotateY(180deg) scale(1); }
  }
  .card3d.dealing { animation: deal-in .35s ease-out both; }

  /* ── 牌堆（扇形） ─────────────────────────── */
  #deck-area { margin-top: 36px; }
  .deck-caption {
    text-align: center; color: var(--muted); font-size: 14px;
    margin-bottom: 4px;
  }
  .deck-caption b { color: var(--gold-bright); font-weight: 600; }
  #fan-scroll { overflow-x: auto; padding: 26px 12px 18px; }
  #fan {
    display: flex;
    width: max-content; margin: 0 auto;
    padding: 0 20px;
  }
  .fan-card {
    flex: 0 0 auto;
    width: 52px; height: 78px;
    margin-left: -30px;
    border-radius: 6px;
    border: 1px solid rgba(201,164,92,.4);
    background:
      repeating-linear-gradient(45deg, rgba(201,164,92,.12) 0 1px, transparent 1px 8px),
      repeating-linear-gradient(-45deg, rgba(201,164,92,.12) 0 1px, transparent 1px 8px),
      linear-gradient(160deg, var(--back-1), var(--back-2));
    cursor: pointer;
    transition: transform .18s ease, box-shadow .18s ease;
    padding: 0;
  }
  .fan-card:first-child { margin-left: 0; }
  .fan-card:hover, .fan-card:focus-visible {
    transform: translateY(-14px);
    box-shadow: 0 10px 22px rgba(0,0,0,.45), 0 0 12px rgba(201,164,92,.3);
    z-index: 2; position: relative;
  }
  .fan-card:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  .fan-card.gone { opacity: 0; pointer-events: none; transform: translateY(-30px) scale(.8); }

  .deck-tools { text-align: center; margin-top: 10px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .ghost-btn.gold { color: var(--gold-bright); border-color: var(--gold-dim); }
  .ghost-btn.gold:hover:not(:disabled) { border-color: var(--gold); box-shadow: 0 0 14px rgba(201,164,92,.25); }
  .ghost-btn:disabled { opacity: .35; cursor: not-allowed; }

  /* ── 洗牌與切牌儀式 ───────────────────────── */
  #stack-wrap { display: flex; justify-content: center; align-items: center; padding: 22px 0 8px; min-height: 200px; }
  #stack { position: relative; width: 116px; height: 174px; }
  .stack-card {
    position: absolute; inset: 0; border-radius: 8px;
    border: 1px solid rgba(201,164,92,.4);
    background:
      repeating-linear-gradient(45deg, rgba(201,164,92,.12) 0 1px, transparent 1px 9px),
      repeating-linear-gradient(-45deg, rgba(201,164,92,.12) 0 1px, transparent 1px 9px),
      linear-gradient(160deg, var(--back-1), var(--back-2));
    box-shadow: 0 2px 6px rgba(0,0,0,.35);
    transition: transform .38s cubic-bezier(.3, .7, .3, 1);
  }
  #cut-scroll { overflow-x: auto; padding: 26px 12px 8px; }
  #cut-strip { display: flex; width: max-content; margin: 0 auto; padding: 0 20px; }
  #cut-strip .fan-card { cursor: pointer; }

  /* 專屬卡背（各牌組一款；載入成功時啟用，缺圖退回花紋） */
  body.has-back .fan-card,
  body.has-back .stack-card,
  body.has-back .cface.back {
    background: #1E2A4A var(--back-url, url("cards/back.jpg")) center / cover no-repeat;
    border-color: rgba(201,164,92,.55);
  }
  body.has-back .cface.back::after { content: none; }

  /* ── 解讀帳冊（象牙紙） ────────────────────── */
  #reading { display: none; margin-top: 48px; }
  #reading.on { display: block; }
  .paper {
    background: linear-gradient(175deg, var(--ivory), var(--ivory-shade));
    color: var(--ink);
    border-radius: 3px;
    border: 1px solid var(--gold-dim);
    box-shadow: 0 18px 50px rgba(0,0,0,.45), inset 0 0 0 6px var(--ivory), inset 0 0 0 7px rgba(138,114,69,.4);
    padding: 34px clamp(22px, 5vw, 52px) 38px;
  }
  .paper h3 {
    margin: 0 0 4px;
    text-align: center;
    font-size: 20px; letter-spacing: .3em; text-indent: .3em;
    color: var(--ink); font-weight: 600;
  }
  .paper .paper-sub {
    text-align: center; color: var(--ink-soft); font-size: 13px;
    letter-spacing: .15em; margin-bottom: 26px;
  }
  .entry { padding: 18px 0; border-top: 1px solid rgba(138,114,69,.3); }
  .entry:first-of-type { border-top: none; }
  .entry.spotlit { background: rgba(201,164,92,.14); margin: 0 -16px; padding-left: 16px; padding-right: 16px; border-radius: 4px; }
  .entry .e-pos {
    font-size: 12px; letter-spacing: .3em; color: var(--gold-dim);
    margin-bottom: 4px;
  }
  .entry .e-head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .entry .e-name { font-size: 19px; font-weight: 600; letter-spacing: .1em; }
  .entry .e-glyph { filter: sepia(.5) saturate(.75); }
  .entry .e-keys { font-size: 13px; color: var(--ink-soft); letter-spacing: .1em; }
  .entry .e-text { margin: 8px 0 0; font-size: 15px; max-width: 62ch; }
  .combo-block { border-top: 1px double rgba(138,114,69,.5); margin-top: 8px; padding-top: 20px; }
  .combo-block .cb-title { font-size: 12px; letter-spacing: .3em; color: var(--gold-dim); margin-bottom: 12px; }
  .combo { margin: 0 0 12px; font-size: 15px; max-width: 62ch; }
  .combo b { font-weight: 600; letter-spacing: .06em; }
  .combo .arrow { color: var(--gold-dim); padding: 0 6px; }
  /* 生成牌面圖：載入成功時的版式 */
  .cface.front .c-img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; z-index: 1;
  }
  .cface.front.has-img::after {
    content: ""; position: absolute; left: 4%; right: 4%; bottom: 2.5%;
    height: calc(var(--cw) * .3); z-index: 2;
    background: linear-gradient(180deg, rgba(242,232,213,0), rgba(242,232,213,.94) 42%);
  }
  .cface.front.has-img .c-art { display: none; }
  .cface.front.has-img .c-num { position: absolute; top: 3.5%; left: 5%; right: 5%; z-index: 3; }
  .cface.front.has-img .c-num span {
    background: rgba(242,232,213,.9);
    border: 1px solid rgba(138,114,69,.45);
    border-radius: 3px; padding: 0 .3em;
  }
  .cface.front.has-img .c-zh { position: absolute; left: 0; right: 0; bottom: calc(var(--cw) * .115); z-index: 3; }
  .cface.front.has-img .c-latin { position: absolute; left: 0; right: 0; bottom: calc(var(--cw) * .04); z-index: 3; }

  /* AI 解讀提示詞 */
  .ai-block { border-top: 1px double rgba(138,114,69,.5); margin-top: 8px; padding-top: 20px; }
  .ai-block .ai-note { margin: 0 0 12px; font-size: 13.5px; color: var(--ink-soft); }
  .tone-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin: 0 0 14px; }
  .tone-row label { font-size: 12px; letter-spacing: .25em; text-indent: .25em; color: var(--gold-dim); white-space: nowrap; }
  #tone-select, #tone-custom {
    font-family: var(--serif); font-size: 13.5px; color: var(--ink);
    background: rgba(255,255,255,.5);
    border: 1px solid rgba(138,114,69,.5); border-radius: 4px;
    padding: 7px 10px;
  }
  #tone-custom { flex: 1; min-width: 180px; }
  #tone-select:focus, #tone-custom:focus { outline: none; border-color: var(--ink-soft); }

  .ai-tools { display: flex; gap: 10px; flex-wrap: wrap; }
  .ghost-btn.dark { color: var(--ink-soft); border-color: rgba(138,114,69,.6); }
  .ghost-btn.dark:hover, .ghost-btn.dark:focus-visible { color: var(--ink); border-color: var(--ink-soft); }
  #ai-prompt {
    display: block; width: 100%; min-height: 240px; margin-top: 14px;
    font-family: var(--serif); font-size: 13.5px; line-height: 1.8;
    color: var(--ink); background: rgba(255,255,255,.45);
    border: 1px solid rgba(138,114,69,.5); border-radius: 4px;
    padding: 14px 16px; resize: vertical;
  }
  #ai-prompt[hidden] { display: none; }

  .closing {
    margin-top: 26px; text-align: center;
    color: var(--ink-soft); font-size: 13px; letter-spacing: .2em;
  }

  /* 占卜歷史 */
  #hist-list { display: grid; gap: 12px; }
  .hist-empty { text-align: center; color: var(--muted); font-size: 14px; }
  .hist-item {
    display: flex; flex-wrap: wrap; align-items: center; gap: 6px 16px;
    border-bottom: 1px solid var(--felt-line);
    padding: 16px 6px 14px;
  }
  #hist-list { gap: 0; }
  .hist-item:first-child { border-top: 1px solid var(--felt-line); }
  .hist-item .h-when { color: var(--muted); font-size: 12.5px; letter-spacing: .08em; font-variant-numeric: tabular-nums; }
  .hist-item .h-spread { color: var(--gold-bright); font-size: 14.5px; letter-spacing: .06em; }

/* 加密級 0–1 隨機數 */
function rand01() {
  const b = new Uint32Array(1);
  crypto.getRandomValues(b);
  return b[0] / 4294967296;
}

/* 真實鴿尾式洗牌（GSR 模型）：
   以二項分布把牌切成兩疊，再依兩疊剩餘張數的比例交錯落牌。
   每按一次「洗牌」執行一次；約七次後牌序即接近完全隨機。 */
function riffle(arr) {
  let cutN = 0;
  for (let i = 0; i < arr.length; i++) if (rand01() < 0.5) cutN++;
  const left = arr.slice(0, cutN), right = arr.slice(cutN);
  const out = [];
  let li = 0, ri = 0;
  while (li < left.length || ri < right.length) {
    const lRemain = left.length - li, rRemain = right.length - ri;
    if (rand01() < lRemain / (lRemain + rRemain)) out.push(left[li++]);
    else out.push(right[ri++]);
  }
  return out;
}

/* 真實切牌：把第 pos 張（0 起算）切成新牌頂 */
function cutDeck(arr, pos) {
  return arr.slice(pos).concat(arr.slice(0, pos));
}

function buildStack() {

    c.className = "stack-card";

    elStack.appendChild(c);

function ritualStatus() {
  const parts = [`已洗牌 ${shuffleCount} 次`];
  if (shuffleCount > 0 && shuffleCount < 7) parts.push("再洗幾次會更均勻");
  if (cutCount > 0) parts.push(`已切牌 ${cutCount} 次`);
  if (shuffleCount >= 7) parts.push("牌序已充分混洗");
  elRitualCaption.textContent = parts.join("・") + "。";
}

btnShuffle.addEventListener("click", () => {

  ritualBusy = true;
  if (!elCutScroll.hidden) exitCutView();
  /* 牌序真的改變：一次鴿尾式交錯洗牌 */
  deck = riffle(deck);
  shuffleCount++;
  /* 牌堆散開再聚攏的動畫 */
  const cards = [...elStack.children];
  cards.forEach((c) => {
    c.style.transform = `translate(${(rand01() * 2 - 1) * 70}px, ${(rand01() * 2 - 1) * 34}px) rotate(${(rand01() * 2 - 1) * 30}deg)`;
  });
  setTimeout(() => {

      c.style.transform = `translate(${(i % 3) - 1}px, ${-i * 1.2}px) rotate(${(i % 5) - 2}deg)`;
    });

function doCut(pos) {

/* 位置名稱（含大盤宮位與補牌） */
function posName(i) {
  if (i >= spread.count) return spread.extend.labels[i - spread.count];
  if (spread.id === "gt")
    return `第 ${i + 1} 宮 ・ ${CARDS[i].zh}宮（${CARDS[i].keys.split("・")[0]}之所）`;
  if (spread.id === "houses")
    return `${HOUSES[i].label}（${HOUSES[i].sign}・${HOUSES[i].title}）`;
  return spread.positions[i];
}

/* ── 槽位 ─────────────────────────────────── */
function buildSlots() {
  elSlots.innerHTML = "";
  elSlots.classList.toggle("tableau", spread.id === "gt");
  /* span2：以半格欄位排出金字塔的交錯置中（欄寬 = 半張牌扣掉半個間距） */
  elSlots.style.gridTemplateColumns = spread.span2
    ? `repeat(${spread.cols}, calc(var(--cw) / 2 - 7px))`
    : `repeat(${spread.cols}, var(--cw))`;

  for (let i = 0; i < spread.count; i++) {
    const slot = document.createElement("div");
    slot.className = "slot";
    slot.dataset.idx = i;

    const label = document.createElement("div");
    label.className = "pos-label";
    if (spread.id === "gt") {
      label.classList.add("house");
      label.textContent = `${CARDS[i].zh}宮`;
      label.title = `第 ${i + 1} 宮（${CARDS[i].zh}）：${CARDS[i].keys}`;
    } else {
      label.textContent = spread.positions[i];
      label.title = spread.positions[i];
    }

    const well = document.createElement("div");
    well.className = "card-well";

    slot.appendChild(label);
    slot.appendChild(well);

    /* 大盤最後四張置中（8 欄下的 3~6 欄） */
    if (spread.id === "gt" && i >= 32) {
      slot.style.gridColumn = String(3 + (i - 32));
    }
    /* 十字陣、金字塔等自訂座標 */
    if (spread.place) {
      const col = spread.place[i][0];
      slot.style.gridColumn = spread.span2 ? `${col} / span 2` : String(col);
      slot.style.gridRow = String(spread.place[i][1]);
    }
    elSlots.appendChild(slot);
  }
}

/* 補牌：在既有牌陣尾端加掛澄清牌槽位 */
function addExtensionSlots() {
  const ext = spread.extend;
  for (let k = 0; k < ext.count; k++) {
    const i = spread.count + k;
    const slot = document.createElement("div");
    slot.className = "slot";
    slot.dataset.idx = i;
    slot.style.gridRow = "2";
    slot.style.gridColumn = String(2 + k * 2);   /* 第二列 2、4 欄置中 */
    const label = document.createElement("div");
    label.className = "pos-label";
    label.textContent = ext.labels[k];
    label.title = ext.labels[k];
    const well = document.createElement("div");
    well.className = "card-well";
    slot.appendChild(label);
    slot.appendChild(well);
    elSlots.appendChild(slot);
  }
}

/* ── 牌堆扇形 ─────────────────────────────── */
function buildFan() {
  elFan.innerHTML = "";

    const c = document.createElement("button");
    c.className = "fan-card";
    c.dataset.deckPos = pos;
    c.setAttribute("aria-label", `蓋著的牌 第 ${pos + 1} 張`);
    c.style.transform = `rotate(${(pos - deck.length / 2) * 0.4}deg)`;
    c.addEventListener("click", () => drawFromFan(c, pos));
    elFan.appendChild(c);
  });
}

function drawFromFan(el, deckPos) {
  if (phase !== "draw" || drawn.length >= target || el.classList.contains("gone")) return;
  el.classList.add("gone");
  placeCard(deck[deckPos]);
}

elAuto.addEventListener("click", () => {
  if (autoTimer || phase !== "draw") return;
  const remainingEls = [...elFan.querySelectorAll(".fan-card:not(.gone)")];
  let k = 0;
  autoTimer = setInterval(() => {
    if (drawn.length >= target || k >= remainingEls.length) {
      clearInterval(autoTimer); autoTimer = null; return;
    }
    const el = remainingEls[k++];
    el.classList.add("gone");
    placeCard(deck[el.dataset.deckPos]);
  }, 140);
});

elExtend.addEventListener("click", () => {
  elExtend.hidden = true;
  target = spread.count + spread.extend.count;
  addExtensionSlots();
  updateCaption();
});

/* ── 發牌與翻面 ───────────────────────────── */
function placeCard(cardIdx, forcedRev) {
  const slotIdx = drawn.length;
  const card = CARDS[cardIdx];
  /* 正逆位：重看紀錄時沿用當時的牌位，否則由命運決定 */
  const rev = deckDef.reversible
    ? (forcedRev !== undefined ? !!forcedRev : rand01() < 0.5)
    : false;
  drawn.push(card);
  drawnRev.push(rev);

  const well = elSlots.querySelector(`.slot[data-idx="${slotIdx}"] .card-well`);
  well.classList.add("filled");

  const corner = card.pks || `№ ${card.n}`;
  const mark = rev
    ? `<span class="pol bad">⟲</span>`
    : `<span class="pol ${card.pol}">${POL_MARK[card.pol].slice(0, 1)}</span>`;
  const c3 = document.createElement("div");
  c3.className = "card3d dealing" + (rev ? " rev" : "");
  c3.innerHTML = `
    <div class="cface front">
      <div class="c-num"><span>${corner}</span>${mark}</div>
      <div class="c-art">${card.glyph}</div>
      <div class="c-zh">${card.zh}</div>
      <div class="c-latin">${card.latin}</div>
    </div>
    <div class="cface back"></div>`;
  well.appendChild(c3);

  /* 生成的牌面圖：圖就緒才翻面，避免先閃出符號備援版 */
  const front = c3.querySelector(".cface.front");
  const img = document.createElement("img");
  img.className = "c-img";
  img.alt = "";
  const placedAt = performance.now();
  let revealed = false;
  const reveal = () => {
    if (revealed) return;
    revealed = true;
    /* 保留最短發牌節奏（320ms），圖已快取時也不顯得倉促 */
    const wait = Math.max(0, 320 - (performance.now() - placedAt));
    setTimeout(() => { c3.classList.remove("dealing"); c3.classList.add("revealed"); }, wait);
  };
  const failsafe = setTimeout(reveal, 4000);   /* 圖載太久就先翻（符號版），載到再無縫換圖 */
  img.addEventListener("load", () => {
    front.classList.add("has-img");
    clearTimeout(failsafe);
    reveal();
  });
  img.addEventListener("error", () => {
    img.remove();
    clearTimeout(failsafe);
    reveal();
  });
  img.src = card.img;
  front.appendChild(img);

  /* 牌義跟著牌走：滑過顯示、點按切換（觸控） */
  c3.classList.add("clickable");
  c3.addEventListener("mouseenter", () => showTip(slotIdx, c3));
  c3.addEventListener("mouseleave", hideTip);
  c3.addEventListener("click", () => {
    if (tipSlot === slotIdx && elTip.classList.contains("on")) hideTip();
    else showTip(slotIdx, c3);
  });

  addEntry(card, slotIdx);
  updateCaption();

  if (drawn.length === target) finishReading();
}

function updateCaption() {
  const left = target - drawn.length;
  elCaption.innerHTML = left > 0
    ? `還需抽 <b>${left}</b> 張 ── 憑直覺，選你被召喚的那一張`
    : `牌已抽齊 ── 解讀寫在下方的紙上`;
}

/* ── 解讀帳冊 ─────────────────────────────── */
function addEntry(card, slotIdx) {
  elReading.classList.add("on");
  $("#reading-sub").textContent = spread.name;

  const rev = drawnRev[slotIdx];
  const oTag = deckDef.reversible
    ? `<span class="o-tag${rev ? " rev" : ""}">${rev ? "逆位" : "正位"}</span>`
    : "";
  const e = document.createElement("div");
  e.className = "entry";
  e.dataset.idx = slotIdx;
  e.innerHTML = `
    <div class="e-pos">${posName(slotIdx)}</div>
    <div class="e-head">
      <span class="e-glyph">${card.glyph}</span>
      <span class="e-name">${card.zh}<small style="color:var(--ink-soft)"> · ${card.latin}</small></span>
      ${oTag}
      <span class="pol ${card.pol}">${POL_MARK[card.pol]}</span>
    </div>
    <div class="e-keys">${card.keys}</div>
    <p class="e-text">${rev && card.rtext ? card.rtext : card.text}${gtHouseNote(card, slotIdx)}</p>`;
  elEntries.appendChild(e);
}

function gtHouseNote(card, slotIdx) {
  if (spread.id === "houses" && slotIdx < 12) {
    const h = HOUSES[slotIdx];
    return `<br><em>${h.label}（${h.sign}）掌管${h.title}：${h.hint}——${card.noun}正在這個領域發酵。</em>`;
  }
  if (spread.id !== "gt") return "";
  const house = CARDS[slotIdx];
  if (house.n === card.n) return `<br><em>此牌落在自己的宮位——「${card.zh}」的主題在此刻格外強烈。</em>`;
  return `<br><em>落於${house.zh}宮：${card.noun}${house.mod}。</em>`;
}

function finishReading() {
  /* 補牌完成時不重複產生組合解讀 */
  if (drawn.length > spread.count) {
    elAiBlock.hidden = false;
    elClosing.hidden = false;
    updateHistoryRecord();
    return;
  }

  if (spread.extend) elExtend.hidden = false;
  elAiBlock.hidden = false;
  saveHistoryRecord();

  const combos = spread.combos(drawn);
  if (combos.length) {
    const block = document.createElement("div");
    block.className = "combo-block";
    block.innerHTML = `<div class="cb-title">牌 與 牌 之 間</div>` + combos.map((c) => `
      <p class="combo"><b>${c.a.zh}</b><span class="arrow">✦</span><b>${c.b.zh}</b>
      　<small style="color:var(--ink-soft)">${c.label}</small><br>${c.text}</p>`).join("");
    elCombos.appendChild(block);
  }

  if (spread.id === "gt") {
    const man = drawn.findIndex((c) => c.n === 28);
    const woman = drawn.findIndex((c) => c.n === 29);
    const block = document.createElement("div");
    block.className = "combo-block";
    block.innerHTML = `<div class="cb-title">指 示 牌 落 點</div>
      <p class="combo">「男人」落在第 ${man + 1} 宮（${CARDS[man].zh}宮）——他的處境圍繞著「${CARDS[man].keys.split("・")[0]}」。</p>
      <p class="combo">「女人」落在第 ${woman + 1} 宮（${CARDS[woman].zh}宮）——她的處境圍繞著「${CARDS[woman].keys.split("・")[0]}」。</p>
      <p class="combo" style="color:var(--ink-soft)">讀大盤時，以你的指示牌為中心：它周圍八張牌是眼下的處境，它注視的方向是未來。</p>`;
    elCombos.appendChild(block);
  }

  elClosing.hidden = false;
}

/* ── AI 解讀提示詞 ────────────────────────── */
function buildAiPrompt() {
  const L = [];
  L.push({
    len:"你是一位經驗豐富的雷諾曼（Petit Lenormand）占卜解讀師，熟悉牌義、位置意義與牌與牌之間的組合技法。請以繁體中文為我解讀以下牌陣。",
    sib:"你是一位經驗豐富的義大利西碧拉（Vera Sibilla Italiana）占卜解讀師，熟悉五十二張牌的牌義、正逆位差異、位置意義與牌與牌之間的組合技法。請以繁體中文為我解讀以下牌陣。",
    bel:"你是一位經驗豐富的貝林神諭卡（L'Oracle Belline）占卜解讀師，熟悉五十三張牌、七星體家族的象徵、正逆位差異與位置意義。請以繁體中文為我解讀以下牌陣。",
  }[deckDef.id]);
  if (deckDef.reversible) L.push("本牌陣使用正逆位：逆位請解讀為該牌能量的受阻、延遲、內化或反面。");
  L.push("");
  L.push(`【盤面】${spread.name}（共 ${drawn.length} 張）`);
  if (spread.id === "gt") {
    L.push("排列方式：Grand Tableau 大盤，8×4 加底部置中 4 張（第 33–36 張）。第 n 張牌落在第 n 宮，宮位以傳統 36 張牌的順序命名。");
  } else if (spread.id === "houses") {
    L.push("排列方式：占星十二宮位，每宮一張牌。宮位對應如下：");
    HOUSES.forEach((h) => L.push(`- ${h.label}（${h.sign}）｜${h.title}：${h.hint}`));
  } else if (spread.positions) {
    L.push(`位置依序為：${spread.positions.join("、")}${drawn.length > spread.count ? "，另補兩張澄清牌" : ""}。`);
  }
  L.push("");
  L.push("【抽牌結果】（依抽出順序）");
  drawn.forEach((c, i) => {
    L.push(deckDef.reversible
      ? `${i + 1}. ${posName(i)}：${c.zh} ${c.latin}（${c.pk}，${drawnRev[i] ? "逆位" : "正位"}）— 關鍵詞：${c.keys}`
      : `${i + 1}. ${posName(i)}：${c.zh} ${c.latin}（№${c.n}，撲克對應 ${c.pk}）— 關鍵詞：${c.keys}`);
  });
  L.push("");
  L.push("【請提供】");
  L.push("1. 整體牌陣的基調與核心訊息");
  L.push("2. 逐一位置的解讀（牌義結合位置意義）");
  L.push("3. 相鄰或相關牌之間的組合意義");
  if (spread.id === "gt") {
    L.push("4. 以指示牌（男人／女人，視我的身分）為中心，解讀其周圍八張牌與注視方向");
    L.push(`5. 給問卜者的具體建議（${currentTone()}）`);
  } else {
    L.push(`4. 給問卜者的具體建議（${currentTone()}）`);
  }
  L.push("");
  const q = $("#q-input").value.trim();
  L.push(q ? `我的問題是：${q}` : "我的問題是：〔請把你想問的事寫在這裡〕");
  return L.join("\n");
}

(function restoreTone() {

    elToneCustom.value = localStorage.getItem(TONE_CUSTOM_KEY) || "";

const elTip = document.createElement("div");
elTip.id = "tip";
document.body.appendChild(elTip);
let tipSlot = -1;

function tipHtml(slotIdx) {
  const card = drawn[slotIdx];
  const rev = drawnRev[slotIdx];
  const ori = deckDef.reversible ? ` ・ ${rev ? "逆位" : "正位"}` : "";
  return `
    <div class="tip-pos">${posName(slotIdx)}${ori}</div>
    <div class="tip-name"><span class="tip-glyph">${card.glyph}</span> ${card.zh}
      <small>${card.latin} · ${card.pk}</small></div>
    <div class="tip-keys">${card.keys}</div>
    <p class="tip-text">${rev && card.rtext ? card.rtext : card.text}${gtHouseNote(card, slotIdx)}</p>`;
}

function showTip(slotIdx, cardEl) {
  tipSlot = slotIdx;
  elTip.innerHTML = tipHtml(slotIdx);
  elTip.classList.add("on");
  const r = cardEl.getBoundingClientRect();
  const vw = document.documentElement.clientWidth;
  const tw = elTip.offsetWidth, th = elTip.offsetHeight;
  let x, y;
  if (r.right + 14 + tw <= vw - 6) {          /* 右側 */
    x = r.right + 14; y = r.top + (r.height - th) / 2;
  } else if (r.left - 14 - tw >= 6) {          /* 左側 */
    x = r.left - 14 - tw; y = r.top + (r.height - th) / 2;
  } else {                                     /* 下方置中（窄螢幕） */
    x = Math.min(Math.max(r.left + (r.width - tw) / 2, 6), vw - tw - 6);
    y = r.bottom + 12;
  }
  y = Math.max(y, 6);
  elTip.style.left = (x + window.scrollX) + "px";
  elTip.style.top = (y + window.scrollY) + "px";
}

function hideTip() {
  tipSlot = -1;
  elTip.classList.remove("on");
}

/* 點牌以外的地方 → 收起浮框（行動裝置） */
document.addEventListener("click", (e) => {

/* ── 占卜歷史（localStorage） ─────────────── */
const HIST_KEY = "lenormand-history";
let suppressSave = false;   // 重看舊紀錄時不重複保存
let currentRecId = null;

function loadHist() {
  try { return JSON.parse(localStorage.getItem(HIST_KEY)) || []; }
  catch (e) { return []; }
}
function storeHist(list) {
  try { localStorage.setItem(HIST_KEY, JSON.stringify(list.slice(0, 50))); }
  catch (e) { /* 隱私模式等情況下靜默略過 */ }
}

function saveHistoryRecord() {
  if (suppressSave) return;
  const rec = {
    id: Date.now(),
    when: new Date().toLocaleString("zh-TW", { hour12: false }),
    deck: deckDef.id,
    deckName: deckDef.name,
    spread: spread.id,
    spreadName: spread.name,
    q: $("#q-input").value.trim(),
    cards: drawn.map((c) => c.n),
    revs: deckDef.reversible ? drawnRev.map((r) => (r ? 1 : 0)) : undefined,
  };
  currentRecId = rec.id;
  const list = loadHist();
  list.unshift(rec);
  storeHist(list);
  renderHistory();
}

function updateHistoryRecord() {
  if (suppressSave || currentRecId === null) return;
  const list = loadHist();
  const rec = list.find((r) => r.id === currentRecId);
  if (rec) {
    rec.cards = drawn.map((c) => c.n);
    if (deckDef.reversible) rec.revs = drawnRev.map((r) => (r ? 1 : 0));
    rec.q = $("#q-input").value.trim();
    storeHist(list);
    renderHistory();
  }
}

function renderHistory() {
  const list = loadHist();
  const box = $("#hist-list");
  box.innerHTML = "";
  $("#btn-hist-clear").hidden = list.length === 0;
  if (!list.length) {
    box.innerHTML = `<p class="hist-empty">尚無紀錄——完成一次占卜後會自動保存在這裡。</p>`;
    return;
  }
  list.forEach((rec) => {
    const dk = DECKS.find((x) => x.id === (rec.deck || "len")) || DECKS[0];
    const glyphs = rec.cards.slice(0, 10)
      .map((n, i) => {
        const c = dk.cards[n - 1];
        if (!c) return "？";
        return c.zh + (rec.revs && rec.revs[i] ? "⟲" : "");
      }).join("・")
      + (rec.cards.length > 10 ? `・⋯（共 ${rec.cards.length} 張）` : "");
    const item = document.createElement("div");
    item.className = "hist-item";
    item.innerHTML = `
      <span class="h-when">${rec.when}</span>
      <span class="h-spread">${dk.name} · ${rec.spreadName}</span>
      ${rec.q ? `<div class="h-q">「${rec.q}」</div>` : ""}
      <div class="h-cards">${glyphs}</div>
      <div class="h-actions">
        <button class="ghost-btn h-view">重看</button>
        <button class="ghost-btn h-del">刪除</button>
      </div>`;
    item.querySelector(".h-view").addEventListener("click", () => replayReading(rec));
    item.querySelector(".h-del").addEventListener("click", () => {
      storeHist(loadHist().filter((r) => r.id !== rec.id));
      if (currentRecId === rec.id) currentRecId = null;
      renderHistory();
    });
    box.appendChild(item);
  });
}

$("#btn-hist-clear").addEventListener("click", () => {
  storeHist([]);
  currentRecId = null;
  renderHistory();
});

/* 重看：把紀錄還原到牌桌與解讀帳冊（不重新保存） */
function replayReading(rec) {
  const dk = DECKS.find((x) => x.id === (rec.deck || "len"));
  if (!dk) return;
  if (deckDef !== dk) selectDeck(dk);
  const s = SPREADS.find((x) => x.id === rec.spread);
  if (!s) return;
  const idx = SPREADS.indexOf(s);
  document.querySelectorAll(".spread-btn").forEach((b, i) => b.classList.toggle("active", i === idx));
  spread = s;
  resetTable();
  $("#q-input").value = rec.q || "";
  phase = "draw";
  elRitual.hidden = true;
  elCaption.hidden = false;
  elFanScroll.hidden = true;   /* 重看不需要牌堆 */

  suppressSave = true;
  const revAt = (i) => (rec.revs ? !!rec.revs[i] : false);
  const base = Math.min(rec.cards.length, s.count);
  for (let i = 0; i < base; i++) placeCard(rec.cards[i] - 1, revAt(i));
  if (rec.cards.length > s.count && s.extend) {
    target = s.count + s.extend.count;
    addExtensionSlots();
    for (let i = s.count; i < rec.cards.length; i++) placeCard(rec.cards[i] - 1, revAt(i));
  }
  suppressSave = false;

  currentRecId = null;         /* 重看狀態下不再更新舊紀錄 */
  elExtend.hidden = true;      /* 重看模式沒有牌堆，不提供補牌 */
  elAuto.hidden = true;
  elCaption.textContent = `重看紀錄 ── ${rec.when}`;
  elTable.classList.add("on");
  elTable.scrollIntoView({ behavior: "smooth", block: "start" });
}

renderHistory();

/* ── 牌義字典 ─────────────────────────────── */
const elDictGrid = $("#dict-grid"), elDictDetail = $("#dict-detail");

/* 八種常見位置的讀法：依牌的關鍵詞與吉凶組句 */
function dictPosLines(c) {
  const K = c.keys.split("・");
  const last = K[K.length - 1];
  const isLen = deckDef.id === "len";
  return [
    ["過去・根源", isLen
      ? `${c.noun}是這件事的來處，它的影響仍未散去。`
      : `事情的來處帶著「${K[0]}」的痕跡——${c.zh}的能量塑造了現在的局面。`],
    ["現在・處境", `此刻的主旋律是「${K[0]}」：${c.zh}正當令，先讀懂它，再決定動作。`],
    ["未來・去向", isLen
      ? `前方的路上，${c.noun}正在等你。`
      : `事情正往「${K[0]}」的方向移動——提前把自己安排到對的位置。`],
    ["核心・課題", `問題的心臟是${c.zh}——一切繞著「${K[0]}」打轉，避開它就讀不懂這個局。`],
    ["意識・目標", `檯面上，你追求的是「${K[0]}」。確認這真的是你要的，而不只是習慣。`],
    ["潛藏・根基", `檯面下真正作用的，是「${last}」與「${K[0]}」的暗流——它不說話，但它做決定。`],
    ["建議・指引", c.pol === "good"
      ? `讓「${K[0]}」發生：大方迎接、順勢而為，別擋自己的路。`
      : c.pol === "bad"
      ? `把「${K[0]}」當作警訊：預作準備、及早止損，別跟它硬碰。`
      : `「${K[0]}」本身無吉凶——分寸的拿捏，就是這張牌給你的功課。`],
    ["結果・落點", c.pol === "good"
      ? `結局傾向順遂，以「${K[0]}」圓滿收尾。`
      : c.pol === "bad"
      ? `若路線不變，落點就是「${K[0]}」——現在轉舵還來得及。`
      : `落點是「${K[0]}」，成色由你此刻的選擇決定。`],
  ];
}

function renderDict() {
  elDictDetail.hidden = true;
  elDictGrid.innerHTML = "";
  CARDS.forEach((c, i) => {
    const b = document.createElement("button");
    b.className = "dict-card";
    b.innerHTML = `
      <img class="dc-img" loading="lazy" alt="" src="${c.img}">
      <div class="dc-name">${c.zh}</div>
      <div class="dc-sub">${c.pks || "№ " + c.n}</div>`;
    const img = b.querySelector("img");
    img.addEventListener("error", () => {
      const g = document.createElement("div");
      g.className = "dc-glyph";
      g.textContent = c.glyph;
      img.replaceWith(g);
    });
    b.addEventListener("click", () => showDictCard(i));
    elDictGrid.appendChild(b);
  });
}

function showDictCard(i) {
  const c = CARDS[i];
  let extra = "";
  if (deckDef.id === "len") {
    extra = `
      <div class="dict-sec"><div class="cb-title">組 合 語 法</div>
        <p class="combo">作為句子的開頭（主詞）：<b>${c.noun}</b></p>
        <p class="combo">接在別張牌之後（謂語）：⋯⋯<b>${c.mod}</b></p>
        <p class="combo">大盤宮位：第 ${c.n} 宮・${c.zh}宮——落入此宮的牌，都${c.mod}。</p>
      </div>`;
  }
  const revBlock = deckDef.reversible && c.rtext
    ? `<div class="dict-sec"><div class="cb-title">逆 位 牌 義</div><p class="e-text">${c.rtext}</p></div>`
    : "";
  const posRows = dictPosLines(c)
    .map(([p, t]) => `<p class="combo"><b>${p}</b><br>${t}</p>`).join("");
  const corr = deckDef.id === "len" ? `№ ${c.n} ・ 撲克對應 ${c.pk}` : `${c.pks} ・ ${c.pk}`;
  elDictDetail.innerHTML = `
    <div class="dict-head">
      <img class="dd-img" alt="" src="${c.img}">
      <div class="dd-meta">
        <div class="e-pos">${deckDef.name} ・ ${corr}</div>
        <div class="e-name" style="font-size:24px">${c.zh} <small style="color:var(--ink-soft);font-weight:400">${c.latin}</small></div>
        <div class="e-keys" style="margin-top:8px">${c.keys}</div>
        <div style="margin-top:8px"><span class="pol ${c.pol}">${POL_MARK[c.pol]}</span></div>
      </div>
    </div>
    <div class="dict-sec"><div class="cb-title">${deckDef.reversible ? "正 位 牌 義" : "牌 義"}</div><p class="e-text">${c.text}</p></div>
    ${revBlock}
    ${extra}
    <div class="dict-sec"><div class="cb-title">位 置 解 讀</div>
      <p class="ai-note" style="margin:0 0 4px">同一張牌落在不同位置，說的是不同層面的話——以下用八種常見位置示範讀法。</p>
      ${posRows}
    </div>`;
  const img = elDictDetail.querySelector(".dd-img");
  img.addEventListener("error", () => {
    const g = document.createElement("div");
    g.className = "dd-glyph";
    g.textContent = c.glyph;
    img.replaceWith(g);
  });
  elDictDetail.hidden = false;
  elDictDetail.scrollIntoView({ behavior: "smooth", block: "start" });
}

renderDict();

/* 開發測試鉤子：?dicttest=牌序 直接打開字典詳細頁 */
if (location.search.includes("dicttest")) {
  const di = parseInt(new URLSearchParams(location.search).get("dicttest"), 10) || 0;
  const dd = new URLSearchParams(location.search).get("deck");
  const dk = DECKS.find((d) => d.id === dd);
  if (dk && deckDef !== dk) selectDeck(dk);
  setView("dict");
  showDictCard(Math.min(di, CARDS.length - 1));
}

/* 開發測試鉤子：?rwdtest=盤面id 自動抽完整個盤面（跨牌組） */
if (location.search.includes("rwdtest")) {
  const id = new URLSearchParams(location.search).get("rwdtest") || "gt";
  const dk = DECKS.find((d) => d.spreads.some((s) => s.id === id));
  if (dk && deckDef !== dk) selectDeck(dk);
  const idx = SPREADS.findIndex((s) => s.id === id);
  if (idx >= 0) {
    document.querySelectorAll(".spread-btn")[idx].click();
    deck = riffle(deck); shuffleCount++;
    btnBegin.disabled = false;
    btnBegin.click();
    [...elFan.querySelectorAll(".fan-card")].slice(0, target).forEach((el, i) => {
      el.classList.add("gone");
      placeCard(deck[i]);
    });
  }
}
</script>
