      <p class="eyebrow">La Chambre des Destins</p>

    </div>
  </header>

  <nav class="halls-nav">
    <a href="index.html">牌桌館</a>
    <a href="astro.html">占星館</a>

    <a href="bazi.html" class="here">八字館</a>
    <a href="shi.html">式占館</a>
    <a href="nanyang.html">南洋館</a>
    <a href="kaijuan.html">開卷館</a>

  <nav class="views" id="views" aria-label="頁面切換">
    <button class="view-btn active" data-view="divine">起盤問命</button>

  <section id="view-learn"></section>

  <p class="section-label divine-only">選擇命術</p>
  <div class="sys-row" id="sys"></div>

  <section class="panel" id="panel">
    <h2 id="p-title"></h2>
    <span class="hint" id="p-hint"></span>
    <div id="form-birth">
      <p class="fieldset-label" id="birth-label">生辰資料(以出生地當地時間)</p>
      <div class="form-grid">
        <div class="field"><label>出生日期</label><input id="b-date" type="date"></div>
        <div class="field"><label>出生時間</label><input id="b-time" type="time" value="12:00">
          <div class="note">23:00 後出生以夜子時起翌日日柱(子平慣例)</div></div>
        <div class="field"><label>性別</label>
          <select id="b-gender"><option value="m">男</option><option value="f">女</option></select></div>
        <div class="field"><label>時區</label><input id="b-tz" type="number" step="0.5" value="8">
          <div class="note">台灣/中國 +8,日本 +9</div></div>
      </div>
    </div>
    <div class="form-grid" style="margin-top:14px">
      <div class="field full"><label>你的問題</label>
        <input id="q-input" type="text" maxlength="200" placeholder="默想並寫下你想問的事(選填,會寫進提示詞)"></div>
      <div class="field"><label>AI 解讀語氣</label>
        <select id="tone-select"></select>
        <input id="tone-custom" type="text" maxlength="40" placeholder="寫下你想要的語氣" hidden style="margin-top:6px"></div>
    </div>
    <div class="btn-row">
      <button class="gold-btn" id="btn-go">起 盤</button>
      <span class="hint" id="go-hint"></span>
    </div>
  </section>

  <section id="out"></section>

  <section class="prompt-sec" id="prompt-sec" hidden>
    <p class="section-label">AI 解讀提示詞</p>
    <textarea class="prompt-box" id="prompt-box" readonly></textarea>
    <div class="btn-row">
      <button class="gold-btn" id="btn-copy">複製提示詞</button>
      <span class="copy-ok" id="copy-ok" hidden>已複製,貼給任何 AI 即可。</span>
    </div>
  </section>

  <section id="hist-sec">
    <p class="section-label">占卜歷史</p>
    <div id="hist-list"></div>
    <div class="btn-row" style="justify-content:center"><button class="ghost-btn" id="hist-clear">清空歷史</button></div>
  </section>

  <p class="footnote">
    節氣與朔望以真實天文計算(太陽黃經定節氣、定朔定農曆);紫微採中州派安星法,庚干四化取陽武陰同;<br>
    九星命卦男女異算。皆為起盤,論斷交給 AI 或你信任的老師。太乙、奇門、六壬三式請移駕<b>式占館</b>。
  </p>
</div>

<script src="divine-core.js"></script>
<script>
const $ = id => document.getElementById(id);

const SYS = [
  { id: "bazi", name: "八字命盤", sub: "子平四柱", birth: true,
    hint: "年月日時四柱、十神藏干、大運神煞——中式命理的骨架全圖。" },
  { id: "ziwei", name: "紫微斗數", sub: "十四主星十二宮", birth: true,
    hint: "農曆生辰安星,命身十二宮、四化祿權科忌、十年大限。" },
  { id: "shichu", name: "四柱推命", sub: "和流・通変星十二運", birth: true,
    hint: "同樣的四柱,日本流派的讀法:通変星、十二運星、身強身弱。" },
  { id: "ninestar", name: "九星氣學", sub: "本命星與吉方位", birth: true,
    hint: "一白到九紫,你的本命星、月命星與今年的方位吉凶。" },
  { id: "dangsaju", name: "唐四柱", sub: "당사주・韓流民俗", birth: true,
    hint: "朝鮮民間的看圖四柱:年支起星,數月、數日、數時——十二天星定初年/青年/中年/晚年四段人生。" }
];
let sysId = "bazi";

function renderSys() {
  $("sys").innerHTML = "";
  SYS.forEach(s => {
    const b = document.createElement("button");
    b.className = "sys-btn" + (s.id === sysId ? " active" : "");
    b.innerHTML = '<span class="d-name">' + s.name + '</span><span class="d-sub">' + s.sub + '</span>';
    b.onclick = () => { sysId = s.id; updateForm(); renderSys(); };
    $("sys").appendChild(b);
  });
}
function updateForm() {
  const s = SYS.find(x => x.id === sysId);
  $("p-title").textContent = s.name;
  $("p-hint").textContent = s.hint;
  $("out").innerHTML = ""; $("prompt-sec").hidden = true;
}
renderSys(); updateForm();
DC.toneInit(() => { if (!$("prompt-sec").hidden) $("prompt-box").value = $("prompt-box").value.replace(/語氣:「[^」]*」/, "語氣:「" + DC.toneValue() + "」"); });
DC.histBind();

const PK = "dc-bazi-profile";
try { const p = JSON.parse(localStorage.getItem(PK) || "{}"); if (p.bd) { $("b-date").value = p.bd; $("b-time").value = p.bt || "12:00"; $("b-gender").value = p.g || "m"; $("b-tz").value = p.tz || 8; } } catch (e) {}

function card(t, en, body) { return '<div class="result-card"><h3>' + t + (en ? '<span class="en">' + en + "</span>" : "") + "</h3>" + body + "</div>"; }
function fail(msg) { $("go-hint").textContent = msg; return new Error(msg); }
function readBirth() {
  const dv = $("b-date").value; if (!dv) throw fail("請填出生日期");
  const tv = $("b-time").value || "12:00";
  const [y, m, d] = dv.split("-").map(Number), [h, mi] = tv.split(":").map(Number);
  return { y, m, d, h, mi, tz: parseFloat($("b-tz").value) || 8, male: $("b-gender").value === "m", str: dv + " " + tv };
}

/* ── 八字 ── */
const STAGE12 = ["長生", "沐浴", "冠帶", "臨官", "帝旺", "衰", "病", "死", "墓", "絕", "胎", "養"];
const CHANGSHENG = [11, 6, 2, 9, 2, 9, 5, 0, 8, 3]; // 各干長生之支
function twelveUn(dayStem, branch) {
  const st = CHANGSHENG[dayStem];
  const idx = dayStem % 2 === 0 ? ((branch - st) % 12 + 12) % 12 : ((st - branch) % 12 + 12) % 12;
  return STAGE12[idx];
}
function wxCount(bz) {
  const cnt = { 木: 0, 火: 0, 土: 0, 金: 0, 水: 0 };
  for (const p of bz.pillars) { cnt[DC.STEM_WX[p.s]]++; cnt[DC.BRANCH_WX[p.b]]++; }
  return cnt;
}
function pillarsHtml(bz, withTen) {
  const dS = bz.pillars[2].s;
  return '<div class="pillars">' + bz.pillars.map((p, i) => {
    const ten = i === 2 ? "日主" : DC.tenGod(dS, p.s);
    const hid = DC.HIDDEN[p.b].map(hc => hc + "(" + DC.tenGod(dS, DC.STEMS.indexOf(hc)) + ")").join(" ");
    return '<div class="pillar' + (i === 2 ? " day" : "") + '"><span class="p-tag">' + p.tag + '</span>' +
      (withTen ? '<span class="p-ten">' + ten + "</span>" : "") +
      '<span class="p-char">' + p.gz[0] + "<br>" + p.gz[1] + "</span>" +
      '<span class="p-ten">' + p.ny + "</span>" +
      (withTen ? '<span class="p-hid">藏 ' + hid + "</span>" : "") + "</div>";
  }).join("") + "</div>";
}
function runBazi(out, pr) {
  const B = readBirth();
  const bz = DC.bazi(B.y, B.m, B.d, B.h, B.mi, B.tz);
  const dy = DC.dayun(bz, B.male);
  const ss = DC.shensha(bz);
  const cnt = wxCount(bz);
  const dS = bz.pillars[2].s;
  out.push(card("八字命盤", B.str + "(" + (B.male ? "男" : "女") + "命)", pillarsHtml(bz, true) +
    '<div class="kv"><span><b>日主</b>' + DC.STEMS[dS] + DC.STEM_WX[dS] + "</span><span><b>空亡</b>" + bz.kong.join("") + "</span><span><b>五行</b>" +
    Object.entries(cnt).map(([k, v]) => k + v).join(" ") + "</span></div>" +
    (ss.length ? "<p>" + ss.map(s => '<span class="badge">' + s.split("——")[0] + "</span>").join(" ") + "</p>" : "")));
  out.push(card("大運", (dy.fwd ? "順行" : "逆行") + "・" + dy.startAge.toFixed(1) + " 歲起運",
    '<div class="tbl-scroll"><table class="data"><tr><th>起歲</th>' + dy.list.map(d => "<th>" + Math.round(d.fromAge) + "</th>").join("") + "</tr>" +
    "<tr><td>大運</td>" + dy.list.map(d => '<td class="hl">' + d.gz + "</td>").join("") + "</tr>" +
    "<tr><td>十神</td>" + dy.list.map(d => "<td>" + DC.tenGod(dS, d.s) + "</td>").join("") + "</tr></table></div>"));
  pr.push("八字命盤(" + B.str + ",UTC+" + B.tz + "," + (B.male ? "男" : "女") + "命):");
  pr.push("  四柱:" + bz.pillars.map(p => p.tag + " " + p.gz + "(" + p.ny + ")").join("、"));
  pr.push("  日主 " + DC.STEMS[dS] + DC.STEM_WX[dS] + ";天干十神:" + bz.pillars.map((p, i) => i === 2 ? "日主" : p.tag[0] + "干" + DC.tenGod(dS, p.s)).join("、"));
  pr.push("  地支藏干:" + bz.pillars.map(p => p.gz[1] + "藏" + DC.HIDDEN[p.b].map(hc => hc + DC.tenGod(dS, DC.STEMS.indexOf(hc))).join("/")).join("、"));
  pr.push("  五行:" + Object.entries(cnt).map(([k, v]) => k + "×" + v).join(" ") + ";空亡 " + bz.kong.join("") + (ss.length ? ";神煞:" + ss.join(";") : ""));
  pr.push("  大運(" + dy.startAge.toFixed(1) + " 歲起," + (dy.fwd ? "順" : "逆") + "行):" + dy.list.map(d => Math.round(d.fromAge) + "歲 " + d.gz).join("、"), "");
  pr.push("請以子平法解讀:1. 日主強弱與格局(月令得氣、通根透干)。2. 用神喜忌。3. 十神配置的性格與六親。4. 大運走勢——哪十年是黃金、哪十年要蹲低。5. 結合流年" + new Date().getFullYear() + "的提醒。6. 若我有提問,以命盤直答。");
}

/* ── 紫微 ── */
const ZW_LAYOUT = [[5, 0, 0], [6, 0, 1], [7, 0, 2], [8, 0, 3], [4, 1, 0], [9, 1, 3], [3, 2, 0], [10, 2, 3], [2, 3, 0], [1, 3, 1], [0, 3, 2], [11, 3, 3]];
function runZiwei(out, pr) {
  const B = readBirth();
  const bz = DC.bazi(B.y, B.m, B.d, B.h, B.mi, B.tz);
  const lun = DC.lunar(B.y, B.m, B.d, B.tz);
  if (!lun) throw fail("農曆換算失敗");
  const zw = DC.ziwei(lun.month, lun.day, bz.hB, bz.pillars[0].s, bz.pillars[0].b, B.male);
  const lunStr = (lun.isLeap ? "閏" : "") + DC.CN_MONTH[lun.month - 1] + "月" + DC.CN_DAY[lun.day - 1] + DC.BRANCHES[bz.hB] + "時";
  let grid = '<div class="grid12">';
  const cellMap = {};
  for (const [br, r, c] of ZW_LAYOUT) cellMap[r + "," + c] = br;
  for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) {
    if (r === 1 && c === 1) {
      grid += '<div class="center"><b style="color:var(--gold-bright)">' + bz.pillars[0].gz + "年 " + lunStr + "</b>" +
        zw.juName + "・" + (B.male ? "男" : "女") + "命<br>命宮在" + DC.BRANCHES[zw.ming] + "・身宮在" + DC.BRANCHES[zw.shen] + "</div>";
      continue;
    }
    if ((r === 1 || r === 2) && (c === 1 || c === 2)) continue;
    const br = cellMap[r + "," + c], P = zw.P[br];
    grid += '<div class="cell' + (br === zw.ming ? " hl" : "") + '">' +
      '<span class="c-gz">' + DC.STEMS[P.stem] + DC.BRANCHES[br] + '</span>' +
      '<span class="c-palace">' + P.palace + (P.isShen ? "・身" : "") + '</span>' +
      '<span class="star-major">' + (P.stars.join(" ") || "—") + "</span><br>" +
      (P.good.length ? '<span class="star-good">' + P.good.join(" ") + "</span><br>" : "") +
      (P.bad.length ? '<span class="star-bad">' + P.bad.join(" ") + "</span><br>" : "") +
      (P.hua.length ? '<span class="star-hua">' + P.hua.join(" ") + "</span><br>" : "") +
      '<span class="c-tag">大限 ' + P.daxian + "</span></div>";
  }
  grid += "</div>";
  out.push(card("紫微命盤", "中州派安星", grid));
  const mingP = zw.P[zw.ming];
  out.push(card("命宮概要", "", '<p class="lead">命宮' + DC.BRANCHES[zw.ming] + "宮,主星:" + (mingP.stars.join("、") || "無主星(借對宮)") + "</p>" +
    "<p>" + zw.juName + ",第一大限自 " + zw.ju + " 歲起。四化:" + zw.P.flatMap(p => p.hua).join("、") + "。</p>"));
  pr.push("紫微斗數命盤(" + B.str + " → 農曆 " + bz.pillars[0].gz + "年" + lunStr + "," + (B.male ? "男" : "女") + "命," + zw.juName + "):");
  for (let k = 0; k < 12; k++) {
    const b2 = ((zw.ming - k) % 12 + 12) % 12, P = zw.P[b2];
    pr.push("  " + P.palace + "(" + DC.STEMS[P.stem] + DC.BRANCHES[b2] + (P.isShen ? ",身宮" : "") + "):主星[" + (P.stars.join(" ") || "無") + "] 吉[" + (P.good.join(" ") || "—") + "] 煞[" + (P.bad.join(" ") || "—") + "]" + (P.hua.length ? " 四化[" + P.hua.join(" ") + "]" : "") + " 大限" + P.daxian);
  }
  pr.push("", "請解讀:1. 命宮主星組合與命格總論。2. 身宮所在的人生重心。3. 四化祿權科忌落宮的吉凶樞紐。4. 財帛/官祿/夫妻三宮詳論。5. 現行大限與未來十年。6. 若閏月安星與貴派有異請註明(本盤閏月視同本月)。");
}

/* ── 四柱推命(和流)── */
function runShichu(out, pr) {
  const B = readBirth();
  const bz = DC.bazi(B.y, B.m, B.d, B.h, B.mi, B.tz);
  const dS = bz.pillars[2].s;
  out.push(card("四柱推命", "命式(" + B.str + ")", pillarsHtml(bz, true) +
    '<div class="tbl-scroll"><table class="data"><tr><th>柱</th><th>干支</th><th>通変星</th><th>十二運</th></tr>' +
    bz.pillars.map((p, i) => "<tr><td>" + p.tag + '</td><td class="hl">' + p.gz + "</td><td>" + (i === 2 ? "日主" : DC.tenGod(dS, p.s).replace("七殺", "偏官").replace("正印", "印綬")) + "</td><td>" + twelveUn(dS, p.b) + "</td></tr>").join("") + "</table></div>" +
    "<p>十二運星看每一柱的氣勢盛衰:年柱主祖上與少年、月柱主家庭與青年、日柱主自身與中年、時柱主晚年與子息。</p>"));
  pr.push("四柱推命命式(" + B.str + ",UTC+" + B.tz + "," + (B.male ? "男" : "女") + "命):");
  pr.push("  " + bz.pillars.map(p => p.tag + " " + p.gz).join("、") + ";日主 " + DC.STEMS[dS]);
  pr.push("  通変星:" + bz.pillars.map((p, i) => i === 2 ? "日主" : p.tag + DC.tenGod(dS, p.s).replace("七殺", "偏官").replace("正印", "印綬")).join("、"));
  pr.push("  十二運:" + bz.pillars.map(p => p.tag + twelveUn(dS, p.b)).join("、") + ";空亡 " + bz.kong.join(""), "");
  pr.push("請以日本四柱推命流派解讀:1. 日主的身強身弱與五行調候。2. 通変星的性格構造(表星/裏星)。3. 十二運星的人生曲線——哪一柱最旺、哪一柱要養。4. 空亡(天中殺)的年份提醒。5. 綜合給出人生戰略。");
}

/* ── 九星氣學 ── */
function runNinestar(out, pr) {
  const B = readBirth();
  const lichun = DC.solarTerm(B.y, 315);
  const jdB = DC.jd(B.y, B.m, B.d, B.h, B.mi, B.tz);
  const effY = jdB >= lichun ? B.y : B.y - 1;
  const star = B.male ? DC.nineStarYear(effY) : DC.nineStarFemale(effY);
  const bz = DC.bazi(B.y, B.m, B.d, B.h, B.mi, B.tz);
  const mStar = DC.nineStarMonth(star, bz.mIdx);
  const nowY = new Date().getFullYear();
  const lichunNow = DC.solarTerm(nowY, 315);
  const effNow = DC.jd(nowY, new Date().getMonth() + 1, new Date().getDate(), 12, 0, 8) >= lichunNow ? nowY : nowY - 1;
  const yearStar = DC.nineStarYear(effNow);
  const palaceStar = p => ((yearStar - 1 + (p - 5)) % 9 + 9) % 9 + 1; // 年盤飛泊
  let myPalace = 0; for (let p2 = 1; p2 <= 9; p2++) if (palaceStar(p2) === star) myPalace = p2;
  const wuhuang = (() => { for (let p2 = 1; p2 <= 9; p2++) if (palaceStar(p2) === 5) return p2; })();
  const OPP = { 1: 9, 9: 1, 2: 8, 8: 2, 3: 7, 7: 3, 4: 6, 6: 4, 5: 5 };
  const myWx = DC.NSTAR_WX[star];
  const shengWo = DC.WX[(DC.WX.indexOf(myWx) + 4) % 5], woSheng = DC.WX[(DC.WX.indexOf(myWx) + 1) % 5];
  const goodStars = [];
  for (let s2 = 1; s2 <= 9; s2++) if (s2 !== 5 && s2 !== star && (DC.NSTAR_WX[s2] === shengWo || DC.NSTAR_WX[s2] === myWx)) goodStars.push(s2);
  out.push(card("本命星與月命星", "九星氣學",
    '<p class="lead">本命星:' + DC.NSTAR[star] + "(" + (B.male ? "男" : "女") + "命算法)・月命星:" + DC.NSTAR[mStar] + "</p>" +
    "<p>本命星屬" + myWx + ":" + shengWo + "生我為生氣、" + myWx + "比和為旺氣——" + goodStars.map(s2 => DC.NSTAR[s2]).join("、") + " 為你的吉星。</p>"));
  out.push(card("本年年盤(" + effNow + " 立春起)", "五黃殺與吉方",
    '<div class="grid9">' + [4, 9, 2, 3, 5, 7, 8, 1, 6].map(p2 =>
      '<div class="cell' + (p2 === myPalace ? " hl" : "") + '"><span class="g-name">' + DC.GONG_NAME[p2] + '</span><span class="g-main">' + DC.NSTAR[palaceStar(p2)].slice(0, 2) + "</span>" +
      (palaceStar(p2) === 5 ? '<br><span class="g-mut" style="color:#E8A08F">五黃殺</span>' : "") +
      (p2 === OPP[wuhuang] && p2 !== 5 ? '<br><span class="g-mut" style="color:#E8A08F">暗劍殺</span>' : "") +
      (p2 === myPalace ? '<br><span class="g-sub">你在此</span>' : "") + "</div>").join("") + "</div>" +
    "<p>你的本命星今年飛到" + DC.GONG_NAME[myPalace] + "。五黃所在與其對沖(暗劍殺)為大凶方,今年動土、搬遷、遠行宜避。</p>"));
  pr.push("九星氣學(生日 " + B.str + "," + (B.male ? "男" : "女") + "命):");
  pr.push("  本命星 " + DC.NSTAR[star] + ",月命星 " + DC.NSTAR[mStar]);

  ["天貴", "천귀", "👑", "天生貴氣,得長輩貴人提攜,福祿早發,宜近貴而行"],

  ["天壽", "천수", "🐢", "長壽之星,溫厚平穩,晚福深厚——細水長流,笑到最後"]

function runDangsaju(out, pr) {
  const B = readBirth();
  const lun = DC.lunar(B.y, B.m, B.d, B.tz);
  if (!lun) throw fail("農曆換算失敗");
  const lunarYear = (B.m <= 2 && lun.month >= 11) ? B.y - 1 : B.y; // 唐四柱以陰曆年(正月初一換歲)
  const yB = ((lunarYear - 4) % 12 + 12) % 12;
  const hb = Math.floor(((B.h % 24) + 1) / 2) % 12;
  const posY = yB;
  const posM = (posY + lun.month - 1) % 12;
  const posD = (posM + lun.day - 1) % 12;
  const posH = (posD + hb) % 12;
  const stages = [
    ["初年運(~20)", posY, "年支起星"], ["青年運(20-40)", posM, "數至" + (lun.isLeap ? "閏" : "") + DC.CN_MONTH[lun.month - 1] + "月"],
    ["中年運(40-60)", posD, "數至" + DC.CN_DAY[lun.day - 1]], ["晚年運(60~)", posH, "數至" + DC.BRANCHES[hb] + "時"]
  ];
  out.push(card("唐四柱・十二天星", "당사주(" + DC.BRANCHES[yB] + "年 " + (lun.isLeap ? "閏" : "") + DC.CN_MONTH[lun.month - 1] + "月" + DC.CN_DAY[lun.day - 1] + DC.BRANCHES[hb] + "時)",
    '<div class="pillars">' + stages.map(([tag, p]) => {
      const s = DS_STARS[p];
      return '<div class="pillar"><span class="p-tag">' + tag + '</span><span class="p-char" style="font-size:26px">' + s[2] + "<br>" + s[0] + '</span><span class="p-ten">' + s[1] + "</span></div>";
    }).join("") + "</div>" +
    stages.map(([tag, p]) => { const s = DS_STARS[p]; return "<p><b style='color:var(--gold-bright)'>" + tag + " " + s[0] + "(" + s[1] + ")</b>——" + s[3] + "。</p>"; }).join("") +
    "<p>唐四柱為朝鮮時代流行的民間看圖命書(당사주책):不論格局用神,只以十二天星說四段人生,直白如畫。" + (lun.isLeap ? "閏月依本月起數。" : "") + "</p>"));
  pr.push("唐四柱(당사주,韓國民俗四柱):");
  pr.push("  陰曆生辰:" + DC.BRANCHES[yB] + "年" + (lun.isLeap ? "閏" : "") + lun.month + "月" + lun.day + "日" + DC.BRANCHES[hb] + "時(" + B.str + ")");
  pr.push("  " + stages.map(([tag, p, how]) => tag + " " + DS_STARS[p][0] + "(" + DS_STARS[p][1] + "," + how + ")").join(";"), "");
  pr.push("請以唐四柱(당사주)的民俗風格解讀:1. 四段人生各星的圖像與故事——請像朝鮮命書一樣「看圖說話」,直白生動。2. 四星連起來的人生曲線(何時起、何時伏)。3. 若同星重出或吉凶星相鄰,其加乘之義。4. 給命主一句民間老先生式的忠告。");
}

/* ── 主流程 ── */
$("btn-go").onclick = () => {
  $("go-hint").textContent = "";
  try { localStorage.setItem(PK, JSON.stringify({ bd: $("b-date").value, bt: $("b-time").value, g: $("b-gender").value, tz: $("b-tz").value })); } catch (e) {}
  const q = $("q-input").value.trim();
  const out = [], pr = [];
  const head = ["你是一位深研東亞命理的老師。以下是完整的起盤資料。" + DC.toneHead(), ""];
  if (q) head.push("我的問題:" + q, "");
  try {
    ({ bazi: runBazi, ziwei: runZiwei, shichu: runShichu, ninestar: runNinestar, dangsaju: runDangsaju })[sysId](out, pr);
  } catch (e) { if (!$("go-hint").textContent) $("go-hint").textContent = "起盤失敗:" + e.message; return; }
  $("out").innerHTML = out.join("");
  $("prompt-box").value = head.concat(pr).join("\n");
  $("prompt-sec").hidden = false;
  DC.histSave("八字館", SYS.find(x => x.id === sysId).name, q, $("out").innerHTML, $("prompt-box").value);
};
$("btn-copy").onclick = async () => {
  try { await navigator.clipboard.writeText($("prompt-box").value); }
  catch (e) { $("prompt-box").select(); document.execCommand("copy"); }
  $("copy-ok").hidden = false; setTimeout(() => $("copy-ok").hidden = true, 2500);
};
