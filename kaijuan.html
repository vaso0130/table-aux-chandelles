<script>
const $ = id => document.getElementById(id);

/* ═══ 靈籤資料(自牌桌館移植) ═══ */
const QS_DATA = [
["太公釣渭","上上","渭水悠悠八十秋/直鉤釣得帝王舟/風雲一旦從龍起/白髮封侯萬事酬","守靜待時，遇者自遇；大器晚成，貴人西來。","功名:晚成大器，榜有其名|求財:厚積薄發，利在後頭|姻緣:遲來之緣，終成眷屬|健康:靜養為上，老當益壯|出行:宜緩不宜急，貴人同路|謀事:守之必成，急則失之","姜太公年八十，於渭水以直鉤垂釣——不釣魚，釣時勢。文王出獵相遇，載歸拜為國師，終佐周室成八百年基業。"],
["塞翁失馬","中吉","失馬何須問吉凶/塞垣秋草自從容/福兮禍所倚伏處/得失到頭一笑逢","得未必得，失未必失；心平氣和，禍福自轉。","功名:一時失利，轉機在後|求財:小失大得，勿急補倉|姻緣:聚散有時，順其自然|健康:小恙無礙，防患未然|出行:途有變數，終得平安|謀事:塞翁之心，靜觀其變","塞上老翁失馬，人皆弔之，翁曰安知非福；其馬攜駿馬而歸，其子墮馬折髀，因禍免徵，闔家得全。"],
["精衛填海","下籤","口銜木石向滄溟/浪打孤羽誓不停/精衛有心天不管/千年空聽海濤聲","執念如山，力小任重；非不壯烈，問值不值。","功名:力有未逮，另闢蹊徑|求財:投入無底，及時止損|姻緣:一廂情願，強求無果|健康:積勞成疾，先歇再說|出行:風浪未平，暫且莫行|謀事:志可敬而事難成，宜轉向","炎帝之女溺於東海，化為精衛鳥，日銜西山木石以填滄海——志極壯，而海終不可填。"],
["蕭何追韓信","上吉","月下輕騎不忍還/追回國士定江山/明珠豈肯藏塵久/一薦登壇天下安","才不終埋，貴人將至；若為伯樂，追之勿遲。","功名:有人賞識，破格而升|求財:得力夥伴，合力生財|姻緣:失而復得，珍惜眼前|健康:良醫可遇，對症即癒|出行:去而復返，終有好音|謀事:關鍵在人，留住能者","韓信不得志而亡走，蕭何月下策馬追回，力薦劉邦築壇拜將——一追之間，追回了整個漢家天下。"],
["守株待兔","中平","偶得奔兔撞枯樁/便向田頭日日望/歲晚荒畦人笑處/守來守去兩茫茫","僥倖一回，豈可為常；坐等無益，起而行之。","功名:機不再來，勤能補拙|求財:偶得莫恃，正業為本|姻緣:守候無期，主動則明|健康:拖延成患，及早就醫|出行:候之無期，不如起程|謀事:換個方法，勿執一途","宋人耕田，兔走觸株折頸而死；遂釋耒守株，冀復得兔——兔不可復得，而身為宋國笑。"],
["魚躍龍門","上上","禹門三級浪如雷/千尾爭趨勢欲摧/一躍天梯雲作路/從今平地起風雷","關前一搏，魚化為龍；考試競逐，此籤最吉。","功名:一舉登科，名動四方|求財:更上層樓，大利可圖|姻緣:門第得諧，喜事將近|健康:過此一關，體健如初|出行:乘勢而行，一路順風|謀事:放手一搏，必有所成","黃河鯉魚溯流而上，躍過龍門者化而為龍——躍門一瞬，憑的是逆流千里的積蓄。"],
["臥薪嘗膽","中吉","膽味懸門日日嘗/柴薪作枕夜凝霜/十年生聚十年訓/一旦姑蘇霸業償","今日之辱，明日之基；忍得住苦，翻得了身。","功名:此番不利，來年必捷|求財:蓄而後發，先儉後豐|姻緣:患難之情，歷久彌堅|健康:調養經年，根治可期|出行:時機未到，備妥再行|謀事:長線布局，忍字為先","越王勾踐兵敗會稽，臥薪嘗膽二十年，十年生聚、十年教訓，終滅吳雪恥，稱霸諸侯。"],
["杞人憂天","中平","杞國有人憂天傾/寢食俱廢瘦骨形/天行有常終不墜/庸人自擾負此生","所懼未必來，先自傷了身；放下懸念，天塌不了。","功名:多慮誤事，放膽應試|求財:險未必至，穩健即可|姻緣:疑心生暗鬼，坦誠為上|健康:病由心生，寬心是藥|出行:顧慮太多，其實無礙|謀事:七分是憂，三分是事","杞國有人終日憂天崩地陷，寢食俱廢；曉之者曰：天積氣耳，終日行其中，奈何憂崩墜乎。"],
["毛遂自薦","上吉","囊中錐穎久沉埋/一旦鋒芒自薦來/楚殿片言定歃血/始知庸眾有奇才","機會不來，自己站出來；錐處囊中，終須脫穎。","功名:自薦有門，勇者先得|求財:主動出擊，利在敢言|姻緣:主動表意，好事可成|健康:主動求醫，莫諱疾忌|出行:自告奮勇，行必有功|謀事:與其待舉，不如自舉","秦圍邯鄲，平原君擇士赴楚，毛遂自薦隨行；殿上按劍陳詞，片言定合縱之盟。"],
["四面楚歌","下下","垓下夜聞四面歌/八千子弟散如波/英雄至此天亡我/肯過江東奈若何","大勢已去，四面受敵；莫戀戰場，留身為上。","功名:此路不通，勿再強攻|求財:速速收手，保本為先|姻緣:緣分將盡，好聚好散|健康:病勢沉重，速尋良醫|出行:前路兇險，取消為宜|謀事:壯士斷腕，退即是進","項羽被圍垓下，夜聞四面皆楚歌，以為楚地盡失；別虞姬、突重圍，至烏江自刎——蓋世之雄，敗於不肯回頭。"],
["孟母三遷","上吉","一遷再遷不辭勞/為擇芳鄰斷機教/莫道幼苗天性定/好泥培出棟樑高","環境改人，擇鄰而處；為長遠計，遷徙有益。","功名:換個環境，學業大進|求財:遷地為良，別處有財|姻緣:近朱者赤，擇偶看品|健康:水土有礙，易地而養|出行:遷移大吉，新居興旺|謀事:平台不對，果斷換之","孟母為子三遷其居，自墓旁而市集而學宮之側；又斷機杼以喻廢學——孟子終成亞聖。"],
["刻舟求劍","中平","劍落江心舟自行/船舷刻記笑談生/停舟按記尋遺處/水底茫茫月一泓","時移勢易，舊法難用；放下記號，看清水流。","功名:題型已變，勿背舊卷|求財:市況不同，舊招失靈|姻緣:人已改變，莫執往昔|健康:老方難醫新症，更方為宜|出行:路線已改，先查再行|謀事:與時俱進，勿守成規","楚人渡江，劍墜於水，遽刻其舟曰：吾劍所從墜；舟止，從所刻處入水求之——舟已行矣，而劍不行。"],
["鐵杵磨針","中吉","溪畔婆婆杵在手/問言磨作繡花針/謫仙從此收心去/鐵杵原來不負人","功到自成，只怕不恆；眼前雖鈍，磨久便利。","功名:日積月累，終能上榜|求財:細水長流，積少成多|姻緣:慢火燉湯，情深自成|健康:復健貴恆，勿求速效|出行:路遠無妨，終能抵達|謀事:笨功夫是真捷徑","李白少時逃學，見老媼溪畔磨鐵杵，問之，曰欲作針——太白感悟，發憤卒業，終成詩仙。"],
["覆水難收","下籤","盆水傾階不可收/當年輕別悔今休/馬前縱有還鄉印/難喚糟糠再點頭","既成之局，無可挽回；與其追悔，不如前看。","功名:錯過難補，再戰下回|求財:損失已定，勿再加碼|姻緣:破鏡難圓，放手成全|健康:病根已種，重在將養|出行:錯過班期，改日再議|謀事:止損認賠，另起爐灶","朱買臣貧賤時妻求去；及買臣拜太守，妻攔馬乞還，買臣傾水於地令收之——覆水終難收。"],
["三顧茅廬","上上","風雪柴門三度敲/臥龍高枕未曾邀/精誠叩得先生起/一出隆中天下調","誠則靈，再三則得；所求之人事，值得三顧。","功名:誠意感人，名師可得|求財:三訪乃成，大利在後|姻緣:誠心再求，佳偶終允|健康:名醫難掛，三求可得|出行:三次成行，遇合非常|謀事:躬身以請，得一當十","劉備三顧隆中草廬，凡三往乃見；諸葛亮感其誠，隆中一對定三分——誠之所至，臥龍亦起。"],
["亡羊補牢","中吉","夜半圈欄破一方/晨來屈指少三羊/及時修得牢籠固/餘群從此臥斜陽","失雖已失，補猶未晚；檢討漏洞，後福可保。","功名:此科失利，補強再來|求財:破財之後，堵漏為先|姻緣:裂痕初現，及時修補|健康:初病即治，不致大患|出行:行前檢點，可免後患|謀事:錯了就改，猶未為晚","楚臣莊辛諫襄王：見兔顧犬，未為晚也；亡羊補牢，未為遲也——王悟而振作，復收淮北之地。"],
["畫餅充飢","中平","紙上團圞一餅香/望來望去肚空腸/丹青縱好終難嚼/不若親炊黍一觴","空言無補，美景難食；落到實處，方有著落。","功名:空想無益，下場練筆|求財:企劃再美，現金為真|姻緣:甜言雖好，行動為憑|健康:偏方傳言，不如就醫|出行:紙上行程，訂了才算|謀事:先做小樣，再談大局","魏明帝謂盧毓曰：選舉莫取有名，名如畫地作餅，不可啖也——虛名終不充飢。"],
["完璧歸趙","上吉","連城白璧入強秦/殿上睨柱氣凌雲/智勇周旋還故國/寶光依舊照趙人","有驚無險，原物得還；智勇兼施，強敵亦讓。","功名:險中取勝，名節兩全|求財:出借之財，可以索回|姻緣:一度生變，終歸圓滿|健康:虛驚一場，平安無事|出行:攜重物行，謹慎則安|謀事:硬中帶軟，可保全局","藺相如奉璧入秦，見秦王無意償城，持璧睨柱，終完璧歸趙——臨大節而不可奪。"],
["夸父逐日","下籤","逐日狂奔意氣豪/飲乾河渭渴難消/道傍棄杖成鄧林/追到黃昏日更遙","目標太遠，耗盡自身；量力而行，留有餘地。","功名:目標過高，調整期望|求財:攤子太大，量入為出|姻緣:高攀辛苦，平視則安|健康:透支過度，強弩之末|出行:路程過遠，分段而行|謀事:縮小規模，先求可成","夸父與日逐走，渴飲河渭不足，北走大澤，道渴而死；棄其杖，化為鄧林。"],
["柳暗花明","上吉","山窮水復路疑無/轉過溪橋景色殊/柳暗花明逢一村/人間何處不通途","絕處逢生，轉角有路；莫在山前，先說無路。","功名:題面雖難，峰迴路轉|求財:僵局將解，新路自開|姻緣:誤會冰釋，柳暗花明|健康:久病遇醫，豁然而癒|出行:改道反順，意外之喜|謀事:再撐一程，轉機就到","陸游遊山西村：山重水複疑無路，柳暗花明又一村——路不絕人，只怕人自絕。"],
["莊周夢蝶","中平","莊生曉夢化蝶飛/花底翩翩忘是非/醒後不知身是客/眼前真幻兩依依","真假難辨，虛實相生；先別急定，靜觀為上。","功名:虛名如夢，實學為真|求財:帳面之利，落袋才真|姻緣:霧裡看花，再看一季|健康:症狀恍惚，詳查為要|出行:行程未定，確認再三|謀事:虛實未明，勿下重注","莊周夢為蝴蝶，栩栩然蝴蝶也；俄然覺，不知周之夢為蝶與，蝶之夢為周與——物化之間，真幻難分。"],
["聞雞起舞","中吉","中夜荒雞喔喔啼/攬衣把劍舞霜庭/但教筋骨常磨礪/他日中原任爾行","自律者強，晨興者成；功夫在平日，機會給醒人。","功名:勤能致勝，天道酬勤|求財:早起之鳥，先得其利|姻緣:經營有恆，情意日深|健康:晨練有功，體魄日壯|出行:早行為宜，趕早不趕晚|謀事:準備在先，機來即上","祖逖與劉琨共被同寢，中夜聞荒雞鳴，蹴琨曰：此非惡聲也，因起舞——後率師北伐，志清中原。"],
["葉公好龍","中平","畫棟雕龍色色新/真龍一顧失精神/世間多少慕名客/愛到臨頭始見真","口說喜歡，未必真愛；考驗一來，見了真章。","功名:志在虛名，不如實幹|求財:紙上生意，見真章怯|姻緣:葉公之愛，遇真則逃|健康:嘴上養生，不如力行|出行:嚮往已久，真去卻疑|謀事:先問自己，是真要嗎","葉公好龍，屋室雕文盡以寫龍；天龍聞而下之，窺頭於牖，葉公見之，棄而還走，失其魂魄。"],
["破鏡重圓","上吉","半面菱花各自藏/天涯人海兩茫茫/中秋市上高聲賣/照影重圓喜欲狂","離而復合，失而復得；信物猶在，舊情可續。","功名:重考重逢，舊願得償|求財:舊帳可收，舊業可復|姻緣:破鏡重圓，大吉之兆|健康:舊疾去根，復元可期|出行:故地重遊，遇故知音|謀事:重啟舊案，此番能成","樂昌公主與徐德言破鏡各執其半，約亂後正月望日賣於都市；後果以半鏡相認，夫妻重圓。"],
["大意失荊州","下下","威震華夏一時雄/白衣渡江燈火中/麥城路窄天將曉/回首荊州煙雨濛","驕兵必敗，腹背受敵；越是得意，越要小心。","功名:輕敵大意，陰溝翻船|求財:後院起火，首尾難顧|姻緣:自恃太過，情變於後|健康:小症輕忽，釀成大患|出行:輕裝犯險，凶多吉少|謀事:盟友難恃，退保根本","關羽水淹七軍威震華夏，而輕東吳；呂蒙白衣渡江襲荊州，羽敗走麥城，父子俱殞。"],
["圯上納履","中吉","圯橋墮履試孺子/俯身長跪奉還之/一卷兵書酬折節/運籌帷幄看他時","小忍成大器，折節得真傳；眼前受點屈，後頭有真章。","功名:得遇明師，虛心則進|求財:低頭一時，得利長久|姻緣:遷就有度，終得認可|健康:遵醫囑行，忍口忌嘴|出行:途遇考驗，耐住性子|謀事:先過臉面關，再得真機會","張良於圯上遇黃石公，老人三墮其履，良俯拾長跪進之；公喜，授《太公兵法》——後為帝者師。"],
["井底之蛙","中平","一井青天曰大觀/坐談滄海笑波瀾/何當躍上欄邊看/始信乾坤萬里寬","所見尚小，天地正大；跳出框框，眼界自開。","功名:視野未足，出門遊學|求財:小圈生意，出圈有利|姻緣:圈子太小，廣結善緣|健康:偏聽一說，多問名醫|出行:遠行開眼，大有裨益|謀事:多看同業，勿閉門造車","埳井之蛙誇其井樂於東海之鱉；鱉語以海之大，蛙乃適適然驚，規規然自失。"],
["枯木逢春","上上","雪壓霜欺歲月深/斷枝誰信有春心/東風一夜吹芽動/老幹重開花滿林","否極泰來，絕處回生；久困之人，得此大吉。","功名:久試不第，此番高中|求財:蟄伏已久，大運將至|姻緣:遲遲未遇，良緣忽至|健康:沉痾漸癒，春回體健|出行:久滯得行，一路花開|謀事:死局復活，放手去做","老樹經冬如死，人皆以為枯；東風既至，芽從故枝發，花開勝往年——生機不絕，只待春來。"],
["蘇武歸漢","上吉","雪窖冰天十九年/節旄落盡志彌堅/雁書一到單于帳/白髮持旌入漢天","守得雲開，終見月明；堅持節操，必有歸期。","功名:多年苦讀，終得功名|求財:遠方之財，終能收回|姻緣:兩地相思，終成團圓|健康:久病不餒，終得痊癒|出行:久客思歸，歸期已近|謀事:堅守立場，終獲肯定","蘇武使匈奴被留，牧羝北海十九年，杖漢節不失；昭帝時以雁足繫書之說得還，鬚髮盡白而節義照千古。"],
["揠苗助長","下籤","宋人憫苗日日量/嫌遲親手拔苗長/歸家自詡功勞大/明日田中盡槁黃","欲速不達，催之反枯；生長有時，靜候其成。","功名:填鴨速成，反壞根基|求財:催熟之利，必有後患|姻緣:逼婚催嫁，揠苗之愛|健康:猛藥求快，傷及元氣|出行:趕程冒進，欲速不達|謀事:給它時間，勿強推進","宋人憫其苗之不長而揠之，茫茫然歸，謂家人曰：今日病矣，予助苗長矣——其子趨往視之，苗則槁矣。"],
["管鮑之交","中吉","貧時分利每多求/鮑叔知君非為謀/薦作齊相成霸業/知心一個勝千儔","知己難得，得之事成；合夥之義，在諒不在利。","功名:得友提攜，同榜有名|求財:合夥可成，擇信而合|姻緣:知心為上，條件其次|健康:益友勸醫，聽勸則安|出行:結伴而行，彼此照應|謀事:找對搭檔，事半功倍","管仲與鮑叔牙同賈，分財多自與，鮑叔不以為貪，知其貧也；後薦管仲相齊成霸業——管仲曰：生我者父母，知我者鮑子也。"],
["杯弓蛇影","中平","壁上雕弓落酒卮/杯中疑見小蛇移/心頭一釋沉痾去/天下本無庸自疑","疑心生病，釋疑病除；所懼多半是影，看清便自安然。","功名:自疑太過，實力其實夠|求財:風聲鶴唳，查證再說|姻緣:捕風捉影，傷了和氣|健康:心病還須心藥醫|出行:傳聞勿信，查實再定|謀事:先辨真偽，再作打算","樂廣宴客，壁上角弓映杯中如蛇，客飲而疾；廣復置酒於故處示之，乃弓影也——客豁然意解，沉痾頓癒。"],
["田忌賽馬","中吉","三番賭馬局初開/先棄一場莫論衰/調度中間藏勝著/輸贏原在算籌來","棄小保大，調度取勝；資源不變，排序生機。","功名:取捨得宜，以強擊弱|求財:棄小利，取大局|姻緣:揚長避短，誠意取勝|健康:主症先治，小恙後調|出行:錯峰而行，避擁得順|謀事:重排順序，勝負立變","田忌與齊王賽馬屢敗；孫臏教以下駟對上駟、上駟對中駟、中駟對下駟——一敗二勝，遂霸全局。"],
["飛蛾撲火","下下","一點寒燈焰正嬌/紛紛翠羽撲光跳/明知火裡無生路/猶把殘軀葬此宵","明知是火，偏要飛撲；迷途知返，懸崖勒馬。","功名:方向全錯，愈努力愈傷|求財:高息之餌，血本無歸|姻緣:飛蛾之戀，傷身傷心|健康:惡習不改，自招其禍|出行:明知險地，切莫前往|謀事:立即抽身，勿抱幻想","飛蛾見火光而投之，非火召蛾，蛾自赴也——世間禍事，多半是自己撲上去的。"],
["囊螢映雪","上吉","囊裡流螢當燭光/窗前積雪映書黃/寒門莫嘆無燈火/自有功名雪夜藏","條件雖差，志氣補之；苦讀之人，天不相負。","功名:寒窗有成，清寒更奮|求財:白手起家，勤儉致富|姻緣:貧賤之交，情比金堅|健康:清苦無妨，規律是寶|出行:簡裝上路，一樣到達|謀事:資源有限，創意無限","車胤家貧，夏月練囊盛數十螢火以照書；孫康冬夜映雪讀書——二人俱以苦學顯達。"],
["東施效顰","中平","西子捧心病亦妍/東鄰依樣蹙眉尖/不知妍醜由天賦/依樣葫蘆惹笑喧","學人皮毛，反失自己；走自己的路，用自己的臉。","功名:套用他法，不如自建|求財:抄襲跟風，利薄險高|姻緣:做回自己，自有人愛|健康:別人藥方，未必合你|出行:熱門路線，未必適己|謀事:參考可以，照抄必敗","西施病心而顰，里之醜人見而美之，歸亦捧心而顰；其里富人見之，閉門而不出——不知顰之所以美。"],
["大禹治水","上上","父鯀堙川川愈狂/禹疏九河水歸洋/三過家門聽兒哭/一片神州始種桑","疏而不堵，大功告成；公而忘私，天下歸心。","功名:方法對了，大功可成|求財:活水生財，勿堵勿囤|姻緣:多留溝通，情自順流|健康:疏通調理，勝於強壓|出行:公務出行，勞而有功|謀事:引導代替對抗，必成","鯀障洪水九年無功；禹改以疏導，開九州、通九道，三過家門而不入，十三年而水土平。"],
["螳螂捕蟬","下籤","寒蟬飲露噪高枝/螳臂藏花欲進時/黃雀窺螳人挾彈/眼前之利後頭危","見利忘身，身後有患；先看背後，再伸手。","功名:只顧眼前，提防背後|求財:利誘之局，恐是陷阱|姻緣:三角糾葛，及早抽身|健康:小利傷身，熬夜是債|出行:財不露白，慎防扒竊|謀事:每一步，都回頭看一眼","園中之樹有蟬，螳螂委身欲取蟬，不知黃雀在其傍；黃雀延頸欲啄螳螂，不知彈丸在其下——皆務欲得其前利，而不顧其後之患。"],
["老馬識途","中吉","迷谷茫茫失故蹊/風沙目斷馬頻嘶/放韁一任識途走/踏出山前舊路泥","經驗是寶，老者可師；迷途之時，問曾走過的人。","功名:請教前輩，少走彎路|求財:老行家言，值得一聽|姻緣:長輩之見，參考有益|健康:老醫沉穩，信而從之|出行:嚮導帶路，平安抵達|謀事:先例可循，按圖索驥","管仲從桓公伐孤竹，春往冬返，迷失道；管仲曰：老馬之智可用也，乃放老馬而隨之，遂得道。"],
["昭君出塞","中平","毛延壽筆誤傾城/馬上琵琶出塞行/朔漠風沙五十載/換來邊塞息刀兵","遠適他方，先屈後伸；個人之失，或成大局之得。","功名:外地有缺，遠就則成|求財:利在遠方，離鄉可得|姻緣:遠嫁遠娶，先苦後安|健康:水土初異，調適則安|出行:遠行雖遠，安然有成|謀事:接受外派，委屈有值","王昭君不賂畫工，遠嫁匈奴和親；塞上息兵數十年，青塚留千古之名。"],
["班超投筆","上吉","案牘勞形歲月侵/擲毫一嘆立雄心/玉門關外三十國/萬里封侯自此尋","換道而行，大器另成；文不成時，武或有功。","功名:轉換跑道，別有天地|求財:改行之議，可以成真|姻緣:換個圈子，遇見對人|健康:換個作息，精神一振|出行:遠方有功，壯遊有得|謀事:放下舊業，新途更寬","班超家貧傭書，投筆嘆曰：大丈夫當效傅介子、張騫立功異域，安能久事筆硯間——後使西域三十餘年，封定遠侯。"],
["鷸蚌相爭","下籤","蚌殼初開曬晚沙/鷸喙一啄兩相夾/相持不放漁翁至/雙雙提入酒人家","兩虎相爭，漁翁得利；鬥氣之局，先退者贏。","功名:惡性競爭，兩敗俱傷|求財:削價互耗，旁人得利|姻緣:僵持傷情，退一步海闊|健康:氣大傷身，先顧自己|出行:爭道搶行，徒生事端|謀事:及早和解，勿讓外人撿便宜","蚌方出曝，鷸啄其肉，蚌合而拑其喙；兩者不肯相舍，漁者得而並禽之——蘇代以此諫趙，勿使強秦為漁父。"],
["程門立雪","中吉","同侍程門雪正飛/不驚師夢立多時/醒來門外深盈尺/道在誠中不在辭","尊師重道，誠敬有得；求教之心，要經得起等。","功名:虛心求教，學問大進|求財:敬字當頭，老店可學|姻緣:以敬相待，情義自長|健康:遵從醫囑，耐心療養|出行:拜訪之行，誠意先到|謀事:姿態放低，門自然開","楊時與游酢往見程頤，頤瞑坐，二人侍立不去；頤既覺，門外雪深一尺矣——立雪之誠，傳為師道美談。"],
["買櫝還珠","中平","楚人賣珠飾其函/珠光反被匣光掩/鄭人買櫝還珠去/世上幾人識內涵","重表輕裡，取捨顛倒；看貨要看本質。","功名:重形式輕內容，失分在此|求財:包裝勿過，本質為王|姻緣:外貌之外，多看人品|健康:補品再貴，不如食療|出行:名氣景點，未必值得|謀事:資源放對地方，別本末倒置","楚人賣珠於鄭，為木蘭之櫃，薰以桂椒、綴以珠玉；鄭人買其櫝而還其珠——善賣櫝矣，未可謂善鬻珠也。"],
["衣錦還鄉","上上","十年燈火別家山/一領宮袍奪目還/父老爭看橋上過/兒時溪水亦開顏","功成名就，榮歸故里；在外之人，得此大吉。","功名:金榜題名，光耀門楣|求財:外出得財，滿載而歸|姻緣:成家立業，雙喜臨門|健康:康復如初，容光煥發|出行:歸程順遂，備受歡迎|謀事:大功告成，可以收官","蘇秦佩六國相印過洛陽，車騎輜重擬於王者，昆弟妻嫂側目不敢仰視——富貴還鄉，人生快意之極。"],
["濫竽充數","下籤","齊王愛聽合竽鳴/南郭先生混隊行/一旦新君要獨奏/連夜收拾出都城","混得了一時，混不了獨奏；真功夫，趁早練。","功名:僥倖難久，實力為要|求財:掛名之利，遲早穿幫|姻緣:偽裝人設，終有拆時|健康:諱疾忌醫，遲早發作|出行:證件不齊，行前補辦|謀事:團隊藏拙，獨當則露","齊宣王使人吹竽必三百人，南郭處士請為王吹竽，廩食以數百人等；宣王死，湣王立，好一一聽之，處士逃。"],
["負荊請罪","上吉","負荊肉袒到門前/一揖冰消積歲嫌/將相和時強虜懼/兩心共把趙家肩","知錯能改，和好如初；放下身段，得一強援。","功名:化敵為友，如虎添翼|求財:糾紛和解，財路重開|姻緣:低頭認錯，重歸於好|健康:改掉舊習，身體感謝你|出行:同行修好，旅途和樂|謀事:主動修補，合作可期","廉頗不服藺相如位居己上，揚言辱之；相如以先國家之急而後私讎避讓。頗聞之，肉袒負荊至門謝罪，遂為刎頸之交。"],
["疑鄰盜斧","中平","一柄斨斤失屋隅/鄰家童子步趨趨/看他言動無非盜/斧在谷中疑自無","心中有疑，看誰都像；找回事實，疑雲自散。","功名:懷疑黑箱，不如查證|求財:疑人勿用，用人勿疑|姻緣:無憑之疑，最傷感情|健康:疑病自擾，檢查便知|出行:多疑誤事，查實再說|謀事:數據說話，勿憑感覺","人有亡鈇者，意其鄰之子，視其行步、顏色、言語無為而不竊鈇也；俄而抇其谷而得其鈇，他日復見其鄰之子，動作態度無似竊鈇者。"],
["賣油翁","中吉","銅錢覆口一絲孔/瀝油如線不沾濡/莫誇神射穿楊柳/惟手熟爾百巧無","無他，唯手熟爾；千錘百鍊，自成絕活。","功名:反覆練習，考場從容|求財:專精一藝，吃穿不愁|姻緣:日久生巧，相處有道|健康:規律運動，貴在日常|出行:熟路熟門，順順當當|謀事:把一件事做到極致","陳堯咨善射自矜，賣油翁以杓酌油瀝銅錢孔中而錢不濕，曰：我亦無他，惟手熟爾。"],
["泥牛入海","下下","泥牛昂首入滄溟/浪捲濤吞四體平/縱有音書憑誰寄/茫茫從此無回聲","一去無回，杳無音信；投入之前，想清楚。","功名:報名之前，評估勝算|求財:此財有去無回，勿投|姻緣:音訊全無，收心向前|健康:亂投醫藥，石沉大海|出行:音訊難通，先安排聯絡|謀事:及時止步，勿再追加","洞山問僧：見二泥牛鬥入海，直至如今無消息——禪語也，凡沉沒無歸之事皆似之。"],
["愚公移山","上吉","一擔一鋤朝復朝/兒孫接力志不搖/山靈也怕痴心客/自遣夸娥背走霄","有志者事竟成；天助自助者，山也讓路。","功名:長期抗戰，終能攻克|求財:世代經營，基業長青|姻緣:精誠所至，家人終允|健康:慢病慢治，持之以恆|出行:路雖遠，分段必達|謀事:大事化小，每天挖一鋤","北山愚公年且九十，率子孫叩石墾壤欲平太行、王屋；智叟笑止之，公曰：子子孫孫無窮匱也——帝感其誠，命夸娥氏二子負二山。"],
["朝三暮四","中平","狙公賦芧限晨昏/朝三暮四眾狙嗔/改言朝四暮三顆/一樣七枚喜煞人","總數未變，說法一變；看穿把戲，也學會說話。","功名:名實要分清，勿被話術動|求財:優惠話術，算清總帳|姻緣:聽其總意，勿計較字眼|健康:療程包裝，療效為準|出行:行程重組，內容相同|謀事:表述影響人心，善用而勿受欺","狙公賦芧曰：朝三而暮四，眾狙皆怒；曰：然則朝四而暮三，眾狙皆悅——名實未虧而喜怒為用。"],
["曲突徙薪","中吉","煙囪太直柴堆近/過客殷勤勸改遷/不聽終遭回祿禍/方知先見值千金","防患未然，勝於救火；逆耳之言，價值千金。","功名:提前準備，勝過臨陣|求財:買份保障，防範未然|姻緣:小隙早補，勿釀大裂|健康:定期檢查，防重於治|出行:行前檢修，平安一路|謀事:聽得進勸，免掉大禍","客見主人突直積薪，勸曲其突、遠徙其薪，主人不應；俄而火起，鄰里救之。殺牛置酒而不錄言曲突者——曲突徙薪無恩澤，焦頭爛額為上客耶？"],
["邯鄲學步","下籤","壽陵少年慕邯鄲/學步橋頭日日看/新步未成舊步失/歸來匍匐出重關","學新未成，舊本先丟；貪多騖遠，兩頭落空。","功名:換法太勤，根基動搖|求財:模式亂改，老本莫丟|姻緣:比較他人，失了自己|健康:偏方亂試，正軌先守|出行:安排勿貪，量力而遊|謀事:轉型須穩，留好退路","壽陵餘子學行於邯鄲，未得國能，又失其故行矣，直匍匐而歸耳。"],
["紅葉題詩","上吉","深宮紅葉御溝流/題句無心付水悠/流到人間逢韓氏/良緣原自不須求","姻緣天定，妙不可言；無心插柳，柳自成蔭。","功名:無心之作，反得青睞|求財:偶然機緣，帶來財路|姻緣:天賜良緣，大吉之籤|健康:放鬆心情，不藥而癒|出行:途中奇遇，樂事一樁|謀事:順其自然，水到渠成","唐宮人韓氏題詩紅葉，自御溝流出，為于祐所得；後帝放宮人，祐適娶韓氏，各出紅葉相示——方知緣定，一嘆良媒是水流。"],
["騎驢覓驢","中平","跨下毛驢步步隨/沿街高問我驢誰/兒童拍手笑翁憨/低頭一看笑自癡","所求就在身上，回頭便是；向外找遍，不如內省。","功名:實力已具，缺的是自信|求財:財源在手，善用現有|姻緣:良人就在身邊，細看|健康:健康之道，就在日常|出行:目的地近在咫尺|謀事:先盤點手上資源，答案已在其中","禪語：騎驢覓驢，最是可笑——世人求道求福，往往不知所求者早在自家胯下。"],
["中流擊楫","中吉","樓船北渡大江秋/擊楫中流誓不休/不復中原終不返/一篙撐破萬層愁","立誓壯行，氣可鼓不可洩；立了志，就別回頭。","功名:背水一戰，誓師則成|求財:下定決心，財路自開|姻緣:公開承諾，情比金堅|健康:立誓戒斷，一次到位|出行:出發即誓師，一路向前|謀事:斷了猶豫，反而專注","祖逖率部曲渡江北伐，中流擊楫而誓曰：不能清中原而復濟者，有如大江——辭色壯烈，眾皆慨嘆。"],
["畫蛇添足","中平","祠餘卮酒賞舍人/畫地為蛇先者飲/蛇成更與添四足/持杯反落後來人","多此一舉，反失其成；見好就收，完成即停。","功名:答夠就收，多寫多錯|求財:見利即收，加碼反虧|姻緣:示好適度，過猶不及|健康:進補過頭，反傷脾胃|出行:行程勿塞滿，留白是福|謀事:做到剛好，就是完美","楚有祠者賜舍人卮酒，約畫蛇先成者飲；一人蛇先成，乃左手持卮，右手曰：吾能為之足——未成，奪卮者曰：蛇固無足，子安能為之足？"],
["舜耕歷山","上上","歷山躬稼德風行/讓畔讓居民自成/堯帝聞賢妻二女/一犁耕出帝王名","德行所至，人自歸之；埋頭做好，自有人看見。","功名:德才兼備，終獲拔擢|求財:以德聚人，以人聚財|姻緣:品行為聘，良配自來|健康:心正氣和，百邪不侵|出行:所至受敬，處處逢迎|謀事:先修內功，外緣自來","舜耕歷山，歷山之人皆讓畔；漁雷澤，雷澤上人皆讓居——所居成聚，二年成邑，三年成都。堯聞其賢，妻以二女，終禪天下。"],
["荊軻刺秦","下籤","風蕭蕭處易水寒/壯士一去不復還/圖窮匕見功虧簣/留與千秋擊築彈","孤注一擲，功敗垂成；悲壯可歌，不可效法。","功名:準備不足，倉促必敗|求財:豪賭一把，多半血本無歸|姻緣:孤注表白，時機未熟|健康:激烈偏方，風險極高|出行:此行風險大，詳慮再定|謀事:計畫粗糙，先撤回重擬","荊軻攜督亢圖與樊於期首入秦，圖窮而匕首見；環柱追刺不中，身被八創——事所以不成者，欲生劫之，必得約契以報太子也。"],
["木蘭凱旋","上吉","替爺征戍十二冬/百戰歸來氣若虹/天子策勳辭厚祿/當窗理鬢舊房櫳","臨危受命，載譽而歸；扛過重擔的人，終得安還。","功名:臨危受命，載譽而歸|求財:替人守業，終得回報|姻緣:聚少離多，終成正果|健康:操勞多年，終可卸甲休養|出行:遠行雖久，平安凱旋|謀事:扛起重擔，眾望所歸","木蘭代父從軍，征戰十二年，人不知其為女子；凱旋辭官，願馳千里足，送兒還故鄉。"],
["三人成虎","中平","市上何曾有虎行/一人言虎二人驚/三人齊說虎真至/百口鑠金疑自生","謠言三遍，假亦成真；耳聽為虛，眼見為實。","功名:場外謠言多，以公告為準|求財:小道消息，害人不淺|姻緣:讒言離間，信任為盾|健康:網路偏方，遵醫為上|出行:傳聞勿盡信，查官方訊息|謀事:建立查證習慣，謠言止於智者","龐蔥謂魏王曰：三人言市有虎，王信之乎？王曰：寡人信之矣。蔥曰：夫市之無虎明矣，然而三人言而成虎——後蔥自邯鄲返，竟不得見。"],
["庖丁解牛","中吉","十九年來刃若新/未嘗硬碰骨與筋/目中不見全牛日/遊刃恢恢自有神","順著紋理，迎刃而解；懂得門道，事半功倍。","功名:掌握章法，難題自解|求財:摸清行情，下刀精準|姻緣:順性相處，不硬碰硬|健康:順應節律，養生有道|出行:按規律行，順暢無阻|謀事:找到肯綮，一擊即中","庖丁為文惠君解牛，十九年而刀刃若新發於硎；曰：臣以神遇而不以目視，依乎天理，批大郤導大窾——文惠君曰：得養生焉。"],
["霸王別姬","下下","蓋世英雄困垓臺/悲歌帳下淚成杯/紅顏劍底成永訣/從此江東不再來","大勢傾頹，連累所愛；早知今日，何必當初。","功名:大局已定，另謀出路|求財:傾覆之勢，保命保本|姻緣:訣別之象，緣盡於此|健康:重症勿拖，全力救治|出行:凶險之行，萬勿成行|謀事:立即止損，保全家人","垓下之圍，項王夜起帳中，悲歌慷慨；虞姬和之，自刎於帳下——霸王別姬，英雄末路之至悲。"],
["鑿壁偷光","上吉","鄰燭輝輝隔壁明/鑿來一線讀書聲/寒門不鎖凌雲志/借得微光照錦程","善借外力，補己不足；有心向學，牆也擋不住。","功名:借力使力，苦學有成|求財:借勢起家，滾動成長|姻緣:友人牽線，借光成緣|健康:善用資源，就醫有門|出行:搭伴借車，順利成行|謀事:資源不足，就去借","匡衡勤學而無燭，鄰舍有燭而不逮，衡乃穿壁引其光，以書映光而讀之——後位至丞相。"],
["半途而廢","下籤","行到中途意已闌/回頭便棄舊時鞍/機絲一斷難成匹/惜取當初上路難","棄於半途，前功盡毀；再撐一程，或見終點。","功名:最忌中輟，堅持到考完|求財:定投莫停，停則前虧|姻緣:倦怠之期，熬過便好|健康:療程過半，切莫自停藥|出行:中途折返，兩頭落空|謀事:要嘛做完，要嘛別開始","樂羊子遠尋師學，一年來歸；妻引刀趨機曰：若中道而歸，何異斷斯織乎——羊子感其言，復還終業，七年不返。"],
["結草銜環","中吉","嫁妾一言活一人/戰陣結草躓秦臣/銜環黃雀酬恩客/善念原來有果因","善有善報，恩有回聲；今日之德，他日之援。","功名:舊日善緣，今朝助力|求財:施而後得，捨得之道|姻緣:善心之家，福緣自厚|健康:善念養心，心寬體健|出行:途中助人，人亦助你|謀事:多結善緣，關鍵時刻有人拉你","魏顆不從父亂命而嫁其妾；後與秦戰，見老人結草以亢杜回——夜夢老人曰：余，所嫁婦人之父也。另有楊寶救黃雀，銜白環四枚以報。"],
["水中撈月","中平","碧井沉沉月一輪/群猴連臂下深津/攪殘波影空歡喜/抬首青天月是真","所求是影，徒勞無功；抬頭看看，真的在天上。","功名:方向錯了，再努力也空|求財:泡沫之利，撈之則碎|姻緣:單戀幻影，醒醒為好|健康:傳言之效，多為水月|出行:濾鏡美景，實地落差|謀事:先驗真偽，再投心力","群猿見月影在井，恐月沒而世間暗，乃連臂入井撈之；枝折並墮——月在天上，影在水中，勞而無得。"],
["雲開見月","上上","連宵風雨暗千村/雲幕沉沉月無痕/一夜天公收霧氣/清光依舊滿乾坤","陰霾散盡，月本常明；困境之後，一切照舊光明。","功名:陰霾散去，金榜光明|求財:景氣回春，財源復通|姻緣:誤會盡釋，明月重圓|健康:大病初癒，月明體泰|出行:雨過天青，出行大吉|謀事:靜候雲開，則萬事亨通","月未嘗不在，雲蔽之耳；風來雲散，清輝滿地——人生逆境亦如是，守得雲開見月明。"],
["狐假虎威","中平","狐前虎後過山林/百獸奔逃各失魂/莫道狐狸真有勢/威風原是虎之尊","借來的威風，終要還；看人看本尊，做人靠自己。","功名:靠關係一時，靠實力一世|求財:掛名生意，細審本尊|姻緣:炫耀之人，看清底細|健康:名醫掛名，查明主治是誰|出行:掮客中介，認明正主|謀事:借勢可以，別忘自強","虎求百獸而食之，得狐；狐曰：天帝使我長百獸，子隨我後觀百獸見我而敢不走乎——獸見之皆走；虎不知獸畏己而走也。"],
["順水行舟","上吉","一篙點破碧粼粼/兩岸青山迎送頻/風正帆懸舟似箭/千里江陵半日臻","順風順水，勢不可擋；把握當下，乘勢而行。","功名:文思泉湧，下筆如神|求財:行情正順，乘勢佈局|姻緣:兩情相悅，水到渠成|健康:恢復神速，狀態正佳|出行:一路順風，暢行無阻|謀事:趁勢快辦，勿拖勿疑","李白遇赦下江陵：朝辭白帝彩雲間，千里江陵一日還——順水行舟，其疾如此；人生得勢時，亦當如此惜之。"],
["對症下藥","中吉","二人同訴頭疼疾/一瀉一發藥不同/病在表裡分明處/神醫下手自從容","病同因不同，方要對症；找對根源，一藥而癒。","功名:補弱項，而非狂刷題|求財:虧損找根因，勿亂投醫|姻緣:心結各不同，對症溝通|健康:確診再用藥，勿抄他方|出行:依體質備藥，有備無患|謀事:診斷先於方案","府吏倪尋、李延俱頭痛身熱；華佗曰：尋當下之，延當發汗——或問其異，佗曰：尋外實、延內實，故治之宜殊。明日並起。"],
["賠了夫人又折兵","下籤","巧計招親弄假真/洞房花燭鎖郎君/歸舟已載夫人去/岸上空追折卻軍","弄巧成拙，雙重損失；算計他人，反算了自己。","功名:旁門左道，失分更多|求財:貪套利者，連本吐出|姻緣:算計之情，人財兩失|健康:求快傷本，雙倍代價|出行:貪便宜票，誤事又損財|謀事:正道直行，勿使巧計","周瑜設美人計，以孫權妹招親誘劉備；孔明將計就計，備得夫人而歸，瑜追至江邊中伏——軍士皆呼：周郎妙計安天下，賠了夫人又折兵。"],
["嚴陵釣灘","中平","羊裘獨釣富春江/故友龍飛我自藏/加足帝腹渾閒事/一竿風月勝侯王","富貴非吾願，林泉自有樂；是進是退，問問本心。","功名:功名非唯一，退亦是境界|求財:夠用即安，清貧自樂|姻緣:平淡之侶，勝過權門|健康:歸隱山水，養生上策|出行:山水之行，滌盡塵慮|謀事:可為可不為者，不為亦安","嚴光與光武同學，帝即位乃變名隱身，披羊裘釣澤中；召至共臥，光以足加帝腹——除諫議大夫不屈，耕釣富春山終老。"],
["蘇秦刺股","上吉","說秦失意敝貂還/嫂不為炊妻不歡/錐股一年書讀破/再過洛陽人仰觀","先敗後成，發憤圖強；此刻的冷眼，是明日的掌聲。","功名:一敗勿餒，再戰必捷|求財:東山再起，加倍奉還|姻緣:先修自己，人自重之|健康:低谷養志，體魄同修|出行:重整行裝，再出發更遠|謀事:檢討敗因，苦練一年再上","蘇秦說秦王書十上而說不行，歸家妻不下絍、嫂不為炊；乃夜讀太公陰符，引錐自刺其股——期年而合縱成，佩六國相印。"],
["望梅止渴","中平","炎天失道井泉空/士卒唇焦步不前/遙指梅林酸滿口/生津一路到山泉","畫個願景，解一時之渴；終究要找到真泉水。","功名:自我激勵有效，但要真練|求財:願景充飢一時，現金流要真|姻緣:遠距想念，終須相見|健康:止痛非治病，根治為要|出行:設好中繼站，長路好走|謀事:短期激勵加長期實策，雙管齊下","魏武行役失汲道，軍皆渴；乃令曰：前有大梅林，饒子甘酸可以解渴——士卒聞之口皆出水，乘此得及前源。"],
["司馬光破缸","中吉","稚子失身沉甕中/群兒繞走哭聲同/小光拾石當機斷/水瀉缸開救友童","當機立斷，不拘常規；救急之時，打破就打破。","功名:考場應變，靈活取分|求財:危機處理，快狠準|姻緣:關鍵時刻，行動勝千言|健康:急症從權，先救命再說|出行:遇事果斷，化險為夷|謀事:非常之時，行非常之法","群兒戲於庭，一兒登甕，足跌沒水中，眾皆棄去；光持石擊甕破之，水迸，兒得活。"],
["火中取栗","下籤","火裡分明栗子香/貓兒受攛探爐膛/爪焦不見一顆栗/都入靈猴口袋藏","為人火中取栗，自己爪焦無得；看清誰在得利。","功名:為他人作嫁，自身無得|求財:獲利歸人，風險歸你，勿接|姻緣:被利用之情，及早看清|健康:替人扛勞，傷了自己|出行:代人攜物，風險莫接|謀事:先問一句：這事誰得利","泰西寓言：猴誘貓從火中取栗，貓爪焦爛，栗盡入猴腹——受人攛掇火中取栗者，古今皆然。"],
["精誠所至","上吉","暮色茫茫石似虎/將軍滿引一弓開/鏃鋒沒羽石中去/精誠至處金石開","精誠所至，金石為開；全力以赴，無堅不摧。","功名:全神貫注，超常發揮|求財:專注本業，石頭也開花|姻緣:真心實意，鐵石也軟化|健康:意志堅定，康復加速|出行:目標明確，使命必達|謀事:拿出百分百，奇蹟自來","李廣出獵，見草中石以為虎而射之，中石沒鏃；視之石也，因復更射之，終不能復入石矣——誠之至者，金石為開。"],
["五十步笑百步","中平","鼓聲才動棄戈奔/五十步停回首喧/笑彼百步同是走/半斤八兩莫相言","彼此彼此，莫笑他人；要比，就比誰不跑。","功名:勿與差者比，向強者看齊|求財:同業互貶無益，各自修煉|姻緣:互揭舊短，不如都改|健康:比別人健康無用，達標才算|出行:抱怨同伴前，先看自己|謀事:目標是標竿，不是及格線","孟子謂梁惠王：棄甲曳兵而走，或百步而後止，或五十步而後止；以五十步笑百步，則何如——王曰：不可，直不百步耳，是亦走也。"],
["拋磚引玉","中吉","壁上先題兩句詩/瓦磚拋處玉來遲/果然妙手續高唱/以小引大正此時","以小引大，先給後得；釋出誠意，回報更豐。","功名:先亮觀點，引來高人指點|求財:小惠開路，大單自來|姻緣:先遞橄欖枝，對方自回應|健康:小改變引大改善，先動起來|出行:先問路者，得真攻略|謀事:先給再要，槓桿最大","常建欲得趙嘏詩，知嘏將遊靈岩寺，先題兩句於壁；嘏見之，續為四句，果成佳篇——時人謂建乃拋磚引玉。"],
["泣血杜鵑","下籤","蜀魄千年恨未消/聲聲啼血染花梢/不如歸去不如去/月冷空山夜夜號","執念成疾，啼到血枯；放下遺憾，方得新生。","功名:舊憾勿纏，影響臨場|求財:追討舊損，適可而止|姻緣:逝去之情，啼血無益|健康:鬱結傷身，先療心傷|出行:傷心之地，勿再重訪|謀事:承認沉沒成本，轉身向前","蜀望帝杜宇禪位而去，魂化杜鵑，春月晝夜悲鳴，啼至血出乃止——不如歸去，聲聲皆是不甘。"],
["桃園結義","上吉","桃園花底誓詞同/異姓從茲骨肉融/患難相扶三十載/義字千秋照史紅","得遇同志，義結金蘭；團隊既成，大事可議。","功名:讀書會友，相互提攜|求財:合夥同心，其利斷金|姻緣:先為知己，後成眷屬|健康:病友互勉，復健有伴|出行:結伴同遊，情誼更深|謀事:找到對的人，事就成了一半","劉關張於桃園祭告天地，結為兄弟：不求同年同月同日生，只願同年同月同日死——一誓之義，撐起蜀漢半壁。"],
["掩耳盜鈴","中平","舉椎擊鐘鐘自鳴/掩他雙耳竊鐘行/聲在人間掩在己/自欺從來欺不成","問題還在，裝作不見；面對它，才是解法。","功名:弱科逃避，榜上見真章|求財:帳目問題，遮掩必爆|姻緣:矛盾裝睡，遲早清算|健康:症狀忽視，自欺傷身|出行:隱患不查，路上出事|謀事:公開透明，反而安全","范氏之亡也，百姓有得鐘者，欲負而走，鐘大不可負；以椎毀之，鐘況然有音，恐人聞之而奪己也，遽掩其耳。"],
["曹沖秤象","中吉","巨象登舟水記痕/化整為零石代身/累石稱來知象重/童心一點勝千鈞","大題化小，巧思解難；換個角度，難題自明。","功名:難題拆解，逐步得分|求財:大案分期，風險可控|姻緣:大矛盾，拆成小事談|健康:大目標拆小步，如秤象累石|出行:長途分段，輕鬆完成|謀事:化整為零，無事不成","孫權致巨象，太祖欲知其斤重，群下莫能出其理；沖曰：置象大船之上，刻其水痕所至，稱物以載之，則校可知矣——太祖大悅。"],
["竹籃打水","下籤","提籃下井意殷勤/汲得清泉眼底新/走到半途篩漏盡/空籃依舊付風塵","方法不對，努力成空；先換容器，再去打水。","功名:方法錯誤，先修再讀|求財:漏洞不補，賺多漏多|姻緣:單方付出，如籃盛水|健康:三天打魚，養生無效|出行:規劃鬆散，玩了等於沒玩|謀事:先堵漏洞，再談進帳","俗諺：竹籃打水一場空——籃非不動，水非不汲，奈何器不受水；凡制度有漏而空忙者，皆此類也。"],
["蟠桃獻壽","上吉","三千年結一番桃/王母瑤池宴碧霄/獻上長生添海屋/彩雲深處鶴聲遙","福壽綿長，喜慶臨門；敬老孝親，福報自來。","功名:資歷圓熟，水到渠成|求財:長線之資，豐厚回報|姻緣:白首之約，福壽雙全|健康:延年益壽，大吉之兆|出行:賀壽探親，喜氣盈途|謀事:時機成熟，慶功在望","西王母瑤池蟠桃，三千年一熟，食之長生；群仙獻壽，盛會千年——凡問康寧壽考，此籤最吉。"],
["黔驢技窮","下籤","龐然大物入黔中/一吼曾教虎膽空/蹄盡技窮遭一噬/虛聲原不敵真功","唬得了一時，唬不了一世；技止此耳，趕緊進修。","功名:底子單薄，速補內功|求財:噱頭用盡，產品要真|姻緣:人設將破，以誠相待|健康:硬撐體面，不如實檢|出行:裝備虛有其表，行前實測|謀事:別再虛張，拿出真本事","黔無驢，有好事者船載以入；虎見之以為神，稍近益狎，驢不勝怒蹄之；虎因喜，計之曰：技止此耳——斷其喉，盡其肉。"],
["他山之石","中吉","本山玉璞磨難成/借取他山礪石平/攻錯從來資異質/虛懷納諫器方成","他山之石，可以攻玉；外來意見，正好磨己。","功名:參考他人筆記，補己盲點|求財:借鑑同業，優化自身|姻緣:旁觀者清，聽聽朋友怎麼說|健康:第二意見，就診更穩|出行:攻略可借，行程自定|謀事:請外部之眼，照照鏡子","詩經小雅：他山之石，可以為錯；他山之石，可以攻玉——玉不自磨，借石成器；人不自見，借人成智。"],
["退避三舍","中吉","城濮旌旗蔽日開/楚軍驕氣逐風來/三舍一退酬前諾/誘得深入一鼓摧","退是守信，也是誘敵；先讓三分，後發制人。","功名:以退為進，養精蓄銳|求財:讓利三分，客自回頭|姻緣:爭執先退，理直氣和|健康:降低強度，恢復再上|出行:避開高峰，退而更順|謀事:承諾要守，退中藏勝","晉文公為公子時受楚成王之惠，許他日治兵相遇必退避三舍；城濮之戰果退九十里，既全信義，又驕楚師，一戰而霸。"],
["陶潛歸去","中平","不堪束帶見鄉兒/五斗折腰非我期/歸去來兮田未蕪/東籬采菊晚山知","道不同，不相為謀；退一步，自有天地。","功名:此職不合，勿強委屈|求財:錢多而心苦，不如簡單|姻緣:三觀不合，勿強湊合|健康:離開壓力源，病自輕|出行:歸鄉之行，療癒身心|謀事:認清所欲，取捨自明","陶淵明為彭澤令，吏白應束帶見督郵；嘆曰：吾不能為五斗米折腰向鄉里小兒，即日解印綬去職，賦歸去來兮。"],

/* 中文數字（一〜一百） */
function cnNum(n) {
  const d = ["","一","二","三","四","五","六","七","八","九"];
  if (n === 100) return "一百";
  const t = Math.floor(n / 10), o = n % 10;
  return (t ? (t === 1 ? "十" : d[t] + "十") : "") + d[o];
}

/* ═══ 靈籤求籤(自牌桌館移植,擲筊儀式原樣) ═══ */
let qiuStep = "bing", qiuStick = 0, qiuLog = [], qiuBusy = false;
let qiuSheng = 0, qiuYin = 0;

function qiuInit() {
  qiuStep = "bing"; qiuStick = 0; qiuLog = []; qiuBusy = false;
  qiuSheng = 0; qiuYin = 0;
  $("qiu-caption").textContent = "燭已點好。心中默想所問之事——此樓無神,司籤者機緣;誠心即可上香。";
  $("qiu-log").textContent = "";
  $("jiao").hidden = true;
  $("qiu-stick").hidden = true;
  $("btn-go").hidden = false;
  $("btn-go").textContent = "上 香 稟 告";
  $("btn-reset").hidden = true;
}
function qiuRest() {
  qiuStep = "rest"; qiuStick = 0;
  $("qiu-stick").hidden = true;
  $("btn-go").hidden = true;
  $("btn-reset").hidden = false;
  $("qiu-caption").textContent = "三陰筊至——機緣不到,尚不是時候取籤。靜下心,把所問之事想得更清楚,改日再來請筊。";
}
function tossJiao(cb) {
  qiuBusy = true;
  $("jiao").hidden = false;
  [$("jiao-a"), $("jiao-b")].forEach((el) => {
    el.className = "jiao-block round";
    el.dataset.face = "";
    el.classList.remove("toss"); void el.offsetWidth; el.classList.add("toss");
  });
  const a = rand01() < 0.5, b = rand01() < 0.5;
  setTimeout(() => {
    [[$("jiao-a"), a], [$("jiao-b"), b]].forEach(([el, flat]) => {
      el.className = "jiao-block " + (flat ? "flat" : "round");
      el.dataset.face = flat ? "平" : "凸";
    });
    qiuBusy = false;
    cb(a !== b ? "sheng" : a ? "xiao" : "yin");
  }, 580);
}
function buildSlip(c) {
  const el = document.createElement("div");
  el.className = "qslip";
  const g = KJ_YI[c.gua - 1];
  el.innerHTML = `
    <div class="qslip-inner">
      <div class="qs-seal">機緣</div>
      <div class="qslip-body">
        <div class="qs-no">第${cnNum(c.n)}籤</div>
        <div class="qs-gz">${c.gz}籤・屬${c.wx}　利${c.wxs}　宜其${c.wxd}</div>
        <div class="qs-grade">${c.grade}</div>
        <div class="qs-titlebar">${c.zh}</div>
        ${c.poem.map((l) => `<div class="qs-poem">${l}</div>`).join("")}
        <div class="qs-gua">卦象　${g[0]}（${g[1].split("・").slice(0, 2).join("・")}）</div>
        <div class="qs-jie">解曰　${c.jie}</div>
        <div class="qs-bai">白話　${c.bai}</div>
        ${c.items.map(([k, v]) => `<div class="qs-item"><b>${k}</b>　${v}</div>`).join("")}
        <div class="qs-story">典故　${c.story}</div>
        <div class="qs-house">燭 光 卷 樓 ・ 機 緣 司 籤</div>
      </div>
    </div>`;
  return el;
}
function qsPrompt(c) {
  const g = KJ_YI[c.gua - 1];
  const q0 = $("q-input").value.trim();
  return [
    "你是一位深諳廟宇籤詩的解籤人,擅長從籤詩、等第、詩意、典故,以及干支五行與卦象推衍問事者的處境。請以繁體中文為我解籤。" + DC.toneHead(),
    "",
    `【靈籤】第${cnNum(c.n)}籤・${c.grade}——「${c.zh}」`,
    `干支:${c.gz}籤,屬${c.wx}——利${c.wxs},宜其${c.wxd}(可據此參酌時令與方位)。`,
    `卦象:第${c.gua}卦「${g[0]}」(${g[1]})——${g[2]}`,
    "籤詩:",
    ...c.poem.map((l) => `　${l}`),
    `解曰:${c.jie}`,
    `白話:${c.bai}`,
    "分項:" + c.items.map(([k, v]) => `${k}——${v}`).join(";"),
    `典故:${c.story}`,
    ...(qiuLog.length ? [`求籤經過:${qiuLog.join(";")}。(本樓無神,筊以機緣為斷)`] : []),
    "",
    "【請提供】",
    "1. 籤詩逐句釋義與整體詩意(白話可為底本,請再深入)",
    "2. 等第與典故如何映照我的處境",
    "3. 以卦象與干支五行輔斷:卦義與籤詩相參,時令方位可供擇時參考",
    "4. 就我所問之事的具體推斷(可參考分項)",
    "5. 給問事者的具體建議",
    "",
    q0 ? `我所問之事:${q0}` : "我所問之事:〔請把你想問的事寫在這裡〕",
  ].join("\n");
}
function confirmQian() {
  const c = QS_CARDS[qiuStick - 1];
  $("slip-scroll").innerHTML = "";
  $("slip-scroll").appendChild(buildSlip(c));
  $("slip-scroll").scrollLeft = $("slip-scroll").scrollWidth;
  $("qiu-caption").textContent = `第${cnNum(c.n)}籤・${c.grade}——「${c.zh}」。籤紙已展於案上。`;
  $("btn-go").hidden = true;
  $("btn-reset").hidden = false;
  $("prompt-box").value = qsPrompt(c);
  $("prompt-sec").hidden = false;
  DC.histSave("開卷館", `靈籤・第${cnNum(c.n)}籤「${c.zh}」`, $("q-input").value.trim(),
    '<div style="overflow-x:auto;text-align:center">' + $("slip-scroll").innerHTML + "</div>", $("prompt-box").value);
}
function qiuClick() {
  if (qiuBusy) return;
  if (qiuStep === "bing") {
    $("qiu-caption").textContent = "已默稟。擲筊請示——今日可否賜籤?";
    $("btn-go").textContent = "擲 筊 請 籤";
    qiuStep = "qing";
    return;
  }
  if (qiuStep === "qing") {
    tossJiao((r) => {
      if (r === "sheng") {
        qiuLog.push("請籤筊:聖筊——允");
        $("qiu-caption").textContent = "聖筊——機緣已允。搖動籤筒,求你的籤。";
        $("btn-go").textContent = "搖 籤 筒";
        qiuStep = "yao";
      } else if (r === "xiao") {
        qiuLog.push("請籤筊:笑筊");
        $("qiu-caption").textContent = "笑筊——未聞其詳。把所問之事在心中說得更清楚,再擲。";
      } else {
        qiuLog.push("請籤筊:陰筊");
        qiuYin++;
        if (qiuYin >= 3) { $("qiu-log").textContent = qiuLog.join("　"); qiuRest(); return; }
        $("qiu-caption").textContent = `陰筊——機緣未至。靜心三息,再擲一次。(陰筊已 ${qiuYin} 次,三至則今日不取)`;
      }
      $("qiu-log").textContent = qiuLog.join("　");
    });
    return;
  }
  if (qiuStep === "yao") {
    qiuStick = 1 + DC.rand(QS_CARDS.length);
    qiuSheng = 0;
    $("qiu-stick").textContent = `第${cnNum(qiuStick)}籤`;
    $("qiu-stick").hidden = false;
    $("qiu-stick").classList.remove("out"); void $("qiu-stick").offsetWidth; $("qiu-stick").classList.add("out");
    $("qiu-caption").textContent = `籤筒傾落一支——第${cnNum(qiuStick)}籤。連得三聖筊,方為此籤。`;
    $("btn-go").textContent = "擲 筊 問 籤";
    qiuStep = "que";
    return;
  }
  if (qiuStep === "que") {
    tossJiao((r) => {
      if (r === "sheng") {
        qiuSheng++;
        qiuLog.push(`第${qiuStick}籤・聖筊 ${qiuSheng}/3`);
        $("qiu-log").textContent = qiuLog.join("　");
        if (qiuSheng >= 3) {
          $("qiu-stick").hidden = true;
          $("jiao").hidden = true;
          confirmQian();
        } else {
          $("qiu-caption").textContent = `聖筊${cnNum(qiuSheng)}——再擲。連得三聖筊,方為此籤。`;
        }
      } else if (r === "xiao") {
        qiuLog.push(`第${qiuStick}籤・笑筊——退籤`);
        $("qiu-caption").textContent = `笑筊——莞爾未答。第${cnNum(qiuStick)}籤退回筒中,重新搖籤。`;
        $("qiu-log").textContent = qiuLog.join("　");
        qiuStick = 0; qiuSheng = 0;
        $("qiu-stick").hidden = true;
        $("btn-go").textContent = "搖 籤 筒";
        qiuStep = "yao";
      } else {
        qiuLog.push(`第${qiuStick}籤・陰筊——退籤`);
        qiuYin++;
        $("qiu-log").textContent = qiuLog.join("　");
        if (qiuYin >= 3) { qiuRest(); return; }
        $("qiu-caption").textContent = `陰筊——非此籤。第${cnNum(qiuStick)}籤退回筒中,重新搖籤。(陰筊已 ${qiuYin} 次,三至則今日不取)`;
        qiuStick = 0; qiuSheng = 0;
        $("qiu-stick").hidden = true;
        $("btn-go").textContent = "搖 籤 筒";
        qiuStep = "yao";
      }
    });
  }
}
